                lines.push(`${indent(lvl+4)}destination_port_range_list {`);
                pushIfSet(lines, "start_port", it.l4_dst_start, "number", lvl+5);
                pushIfSet(lines, "end_port",   it.l4_dst_end || it.l4_dst_start, "number", lvl+5);
                lines.push(`${indent(lvl+4)}}`);
              }
              lines.push(`${indent(lvl+3)}}`);
              lines.push(`${indent(lvl+2)}}`);

            lines.push(`${indent(lvl+2)}protocol_parameters {`);
            lines.push(`${indent(lvl+3)}icmp_object {`);
            pushIfSet(lines, "type", it.icmp_type, "number", lvl+4);
            pushIfSet(lines, "code", it.icmp_code, "number", lvl+4);
            lines.push(`${indent(lvl+3)}}`);
            lines.push(`${indent(lvl+2)}}`);

            lines.push(`${indent(lvl+2)}protocol_parameters {`);
            lines.push(`${indent(lvl+3)}protocol_number_object {`);
            lines.push(`${indent(lvl+4)}protocol_number = ${it.protocol_number}`);
            lines.push(`${indent(lvl+3)}}`);
            lines.push(`${indent(lvl+2)}}`);
          }
          lines.push(`${indent(lvl+1)}}`);
          lines.push(`${indent(lvl+1)}policy_action {`);
          pushIfSet(lines, "action_type", it.action_type, "string", lvl+2);
          pushIfSet(lines, "nexthop_ip_address", it.nexthop_ip_address, "string", lvl+2);
          if (it.reroute_service_ip || it.reroute_fallback){
            lines.push(`${indent(lvl+2)}reroute_params {`);

            lines.push(`${indent(lvl+2)}}`);
          }
          lines.push(`${indent(lvl+1)}}`);
          lines.push(`${indent(lvl)}}`);
        },
      }],
    ],
    singletons: [],
  },

function hasSubBlocks(type){
  const def = SUB_BLOCKS[type];
  return def && (def.arrays.length || def.singletons.length);
}

/* Renders the inline configuration section for any node with sub-blocks. */
function renderSubblocksFor(node, container){
  const root = container || document;
  const wrap = root.querySelector(".inspSubblocks");
  if (!wrap) return;
  const def = SUB_BLOCKS[node.type];
  if (!def) return;
  wrap.innerHTML = "";

  def.arrays.forEach(([_, sub]) => {
    const arr = (node.fields[sub.arrayKey] = node.fields[sub.arrayKey] || []);
    arr.forEach((item, idx) => wrap.appendChild(renderArraySubblock(node, sub, item, idx)));
  });
  def.singletons.forEach(([_, sub]) => {
    // Render whenever the singleton key is present on the node, even if all its fields are empty.
    // The user clicked "+ Add" to add an empty form they intend to fill in next.
    if (sub.singletonKey in node.fields){
      wrap.appendChild(renderSingletonSubblock(node, sub));
    }
  });

  // Wire add buttons within this section only
  wrap.parentElement.querySelectorAll(".subblock-add button").forEach(b => {
    b.addEventListener("click", () => {
      const kind = b.dataset.add;
      const arrayMatch = def.arrays.find(([k]) => k === kind);
      if (arrayMatch){
        const sub = arrayMatch[1];
        const arr = node.fields[sub.arrayKey] = node.fields[sub.arrayKey] || [];
        arr.push(sub.init());
      } else {
        const singletonMatch = def.singletons.find(([k]) => k === kind);
        if (singletonMatch){
          const sub = singletonMatch[1];
          node.fields[sub.singletonKey] = sub.init();
        }
      }
      renderNodes(); renderInspector(); updateAll();
    });
  });
}

function renderArraySubblock(node, sub, item, idx){
  const el = document.createElement("div");
  el.className = "subblock collapsed";
  el.innerHTML = `
    <div class="subblock-head">
      <span class="lbl"><span class="ico">${ICONS[sub.icon]||ICONS.misc}</span> <b>${sub.label}</b> <span style="color:var(--ink-faint)">${escapeHtml(sub.summary(item))}</span></span>
      <span style="display:flex;align-items:center;gap:6px">
        ${ICONS.chev}
        <button class="subblock-rm" title="Remove">×</button>
      </span>
    </div>
    <div class="subblock-body"></div>`;
  const head = el.querySelector(".subblock-head");
  head.addEventListener("click", ev => {
    if (ev.target.closest(".subblock-rm")) return;
    el.classList.toggle("collapsed");
  });
  el.querySelector(".subblock-rm").addEventListener("click", ev => {
    ev.stopPropagation();
    node.fields[sub.arrayKey].splice(idx, 1);
    renderNodes(); renderInspector(); updateAll();
  });
  const body = el.querySelector(".subblock-body");
  function rebuildBody(){
    body.innerHTML = "";
    sub.fields.forEach(f => {
      if (f.showIf && !f.showIf(item)) return;
      body.appendChild(makeField(item, f, (changed) => {
        head.querySelector(".lbl span:last-child").textContent = sub.summary(item);
        if (changed && changed.triggersVisibility) rebuildBody();
        renderNodes(); updateAll();
      }));
    });
  }
  rebuildBody();
  return el;
}

function renderSingletonSubblock(node, sub){
  const obj = node.fields[sub.singletonKey];
  const el = document.createElement("div");
  el.className = "subblock";
  el.innerHTML = `
    <div class="subblock-head">
      <span class="lbl"><span class="ico">${ICONS[sub.icon]||ICONS.misc}</span> <b>${sub.label}</b> <span style="color:var(--ink-faint)">${escapeHtml(sub.summary(obj))}</span></span>
      <span style="display:flex;align-items:center;gap:6px">
        ${ICONS.chev}
        <button class="subblock-rm" title="Remove">×</button>
      </span>
    </div>
    <div class="subblock-body"></div>`;
  const head = el.querySelector(".subblock-head");
  head.addEventListener("click", ev => {
    if (ev.target.closest(".subblock-rm")) return;
    el.classList.toggle("collapsed");
  });
  el.querySelector(".subblock-rm").addEventListener("click", ev => {
    ev.stopPropagation();
    delete node.fields[sub.singletonKey];
    renderNodes(); renderInspector(); updateAll();
  });
  const body = el.querySelector(".subblock-body");
  function rebuildBody(){
    body.innerHTML = "";
    sub.fields.forEach(f => {
      if (f.showIf && !f.showIf(obj)) return;
      body.appendChild(makeField(obj, f, (changed) => {
        head.querySelector(".lbl span:last-child").textContent = sub.summary(obj);
        if (changed && changed.triggersVisibility) rebuildBody();
        renderNodes(); updateAll();
      }));
    });
  }
  rebuildBody();
  return el;
}

/* Generic emitter used by all sub-blocks that don't define a custom emit. */
function emitSubblockArray(lines, lvl, sub, items){
  (items || []).forEach(item => {
    if (sub.emit){ sub.emit(lines, lvl, item); return; }
    lines.push(`${indent(lvl)}${sub.blockName} {`);
    sub.fields.forEach(f => {
      if (item[f.key] === undefined || item[f.key] === "" || item[f.key] === null) return;
      const tfType = f.type === "number" ? "number" : (f.type === "bool" ? "bool" : "string");
      pushIfSet(lines, f.key, item[f.key], tfType, lvl+1);
    });
    lines.push(`${indent(lvl)}}`);
  });
}
function emitSubblockSingleton(lines, lvl, sub, item){
  if (!item) return;
  if (sub.emit){ sub.emit(lines, lvl, item); return; }
  const has = sub.fields.some(f => item[f.key] !== undefined && item[f.key] !== "" && item[f.key] !== null);
  if (!has) return;
  lines.push(`${indent(lvl)}${sub.blockName} {`);
  sub.fields.forEach(f => {
    if (item[f.key] === undefined || item[f.key] === "" || item[f.key] === null) return;
    const tfType = f.type === "number" ? "number" : (f.type === "bool" ? "bool" : "string");
    pushIfSet(lines, f.key, item[f.key], tfType, lvl+1);
  });
  lines.push(`${indent(lvl)}}`);
}
function emitSubBlocksFor(lines, lvl, node){
  const def = SUB_BLOCKS[node.type];
  if (!def) return;
  def.arrays.forEach(([_, sub]) => emitSubblockArray(lines, lvl, sub, node.fields[sub.arrayKey]));
  def.singletons.forEach(([_, sub]) => emitSubblockSingleton(lines, lvl, sub, node.fields[sub.singletonKey]));
}

function makeField(target, f, onChange){
  const wrap = document.createElement("div");
  wrap.className = "field" + (f.type === "textarea" ? " full" : "");
  const val = target[f.key];
  let control;
  if (f.type === "textarea")     control = `<textarea placeholder="${escapeAttr(f.placeholder||"")}">${escapeHtml(val||"")}</textarea>`;
  else if (f.type === "enum")    control = `<select>${f.options.map(o => `<option value="${o}" ${o===(val||"")?"selected":""}>${o||"—"}</option>`).join("")}</select>`;
  else if (f.type === "bool")    control = `<select><option value="false" ${!val?"selected":""}>false</option><option value="true" ${val?"selected":""}>true</option></select>`;
  else if (f.type === "number")  control = `<input type="number" value="${val??""}" placeholder="${escapeAttr(f.placeholder||"")}"/>`;
  else                           control = `<input type="text" value="${escapeAttr(val||"")}" placeholder="${escapeAttr(f.placeholder||"")}"/>`;
  wrap.innerHTML = `<label>${f.label}</label>${control}${f.hint ? `<div class="field-hint">${escapeHtml(f.hint)}</div>` : ""}`;
  const inp = wrap.querySelector("input,select,textarea");
  inp.addEventListener("input", e => {
    let v = e.target.value;
    if (f.type === "number") v = v === "" ? "" : Number(v);
    if (f.type === "bool")   v = v === "true";
    target[f.key] = v;
    onChange(f);
  });
  return wrap;
}

function deleteSelected(){
  if (!state.selectedIds.length) return;
  const ids = new Set(state.selectedIds);
  state.edges = state.edges.filter(e => !ids.has(e.from) && !ids.has(e.to));
  state.nodes = state.nodes.filter(n => !ids.has(n.id));
  state.selectedIds = [];
  renderNodes(); renderInspector(); updateAll();
}

function duplicateSelected(){
  if (!state.selectedIds.length) return;
  const newIds = [];
  state.selectedIds.forEach(id => {
    const orig = getNode(id);
    if (!orig) return;
    if (getSchema(orig.type).isProvider){ toast("Provider is unique"); return; }
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = uid();
    copy.x += 40; copy.y += 30;
    if (copy.fields._name)        copy.fields._name        += "_copy";
    if (copy.fields.name)         copy.fields.name         += "_copy";
    if (copy.fields.username)     copy.fields.username     += "_copy";
    if (copy.fields.display_name) copy.fields.display_name += " copy";
    state.nodes.push(copy);
    newIds.push(copy.id);
  });
  if (!newIds.length) return;
  renderNodes();
  selectMany(newIds);
  updateAll();
}

window.addEventListener("keydown", e => {
  if (document.activeElement && /input|textarea|select/i.test(document.activeElement.tagName)) return;
  if ((e.key === "Delete" || e.key === "Backspace") && state.selectedIds.length){
    e.preventDefault(); deleteSelected();
  }
});

/* ===========================================================
   TERRAFORM CODEGEN
=========================================================== */
function generateTerraform(){
  const lines = [];
  lines.push(`# ─────────────────────────────────────────────────────────`);
  lines.push(`# generated by nutanix · cartographer  ·  ${new Date().toISOString().replace("T"," ").slice(0,19)} UTC`);
  lines.push(`# ─────────────────────────────────────────────────────────`);
  lines.push("");
  const pc = state.provider.pc_version || "pc7.5.1+";
  const versionConstraint = PC_TO_PROVIDER[pc] || "~> 2.4";
  const versionPin = PC_TO_PROVIDER_PIN[pc] || "2.4.2";
  lines.push(`terraform {`);
  lines.push(`  required_providers {`);
  lines.push(`    nutanix = {`);
  lines.push(`      source  = "nutanix/nutanix"`);
  lines.push(`      version = "${versionConstraint}"  # ${pc} → pinned ${versionPin}`);
  lines.push(`    }`);
  lines.push(`  }`);
  lines.push(`}`);
  lines.push("");

  {
    const pf = stripDefaults(SCHEMAS.nutanix, state.provider);
    lines.push(`provider "nutanix" {`);
    pushIfSet(lines, "endpoint", pf.endpoint, "string", 1);
    pushIfSet(lines, "username", pf.username, "string", 1);
    pushIfSet(lines, "password", pf.password, "string", 1);
    pushIfSet(lines, "port",     pf.port,     "number", 1);
    pushIfSet(lines, "insecure", pf.insecure, "bool",   1);
    pushIfSet(lines, "wait_timeout", pf.wait_timeout, "number", 1);
    lines.push(`}`);
    lines.push("");
  }

  // Data sources first
  const dataNodes = state.nodes.filter(n => n.isData);
  dataNodes.forEach(n => { lines.push(...emitBlock(n)); lines.push(""); });

  // Resources, ordered by category for readability
  const resourceOrder = ["nutanix_category_v2","nutanix_vpc_v2","nutanix_subnet_v2","nutanix_images_v2","nutanix_volume_group_v2","nutanix_storage_containers_v2","nutanix_address_group_v2","nutanix_service_groups_v2","nutanix_floating_ip_v2","nutanix_users_v2","nutanix_roles_v2","nutanix_virtual_machine_v2"];
  const resourceNodes = state.nodes.filter(n => !n.isData && n.type !== "nutanix");
  resourceNodes.sort((a,b) => {
    const ai = resourceOrder.indexOf(a.type); const bi = resourceOrder.indexOf(b.type);
    if (ai !== -1 || bi !== -1) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    return a.type.localeCompare(b.type);
  });
  resourceNodes.forEach(n => { lines.push(...emitBlock(n)); lines.push(""); });

  if (lines[lines.length-1] === "") lines.pop();
  return lines.join("\n");
}

function refFor(node){
  const prefix = node.isData ? "data." : "";
  return `${prefix}${node.type}.${tfId(node)}`;
}

function indent(n){ return "  ".repeat(n); }
function pushIfSet(lines, key, val, type, lvl){
  if (val === undefined || val === null || val === "") return;
  let v;
  if (type === "string") v = JSON.stringify(String(val));
  else if (type === "bool") v = val ? "true" : "false";
  else v = String(val);
  lines.push(`${indent(lvl)}${key} = ${v}`);
}
/* Generic emitter that walks a typed schema's fields and writes them inside the block. */
function emitTypedFields(lines, lvl, sch, fields){
  sch.fields.forEach(f => {
    if (f.key.startsWith("_")) return; // sub-block container keys
    const v = fields[f.key];
    if (v === undefined || v === null || v === "") return;
    if (f.type === "list"){
      const items = String(v).split(",").map(s=>s.trim()).filter(Boolean);
      if (items.length) lines.push(`${indent(lvl)}${f.key} = [${items.map(s=>JSON.stringify(s)).join(", ")}]`);
      return;
    }
    const tfType = f.type === "number" ? "number" : (f.type === "bool" ? "bool" : "string");
    pushIfSet(lines, f.key, v, tfType, lvl);
  });
}

/* Base64-encodes plain text. If the input already looks like base64, leaves it. */
function maybeB64(s){
  if (!s) return s;
  const trimmed = String(s).trim();
  // Heuristic: pure base64 alphabet (with optional padding) and length divisible by 4
  if (/^[A-Za-z0-9+/]+={0,2}$/.test(trimmed) && trimmed.length % 4 === 0 && trimmed.length > 16){
    return trimmed;
  }
  try { return btoa(unescape(encodeURIComponent(s))); }
  catch(e){ return s; }
}

/* Returns a copy of `fields` with any value that still equals its schema default removed —
   so emission only writes attributes the user actually changed. Sub-block container keys
   (anything the schema doesn't list as a top-level field) pass through untouched. */
function stripDefaults(sch, fields){
  if (!sch || !sch.fields) return fields;
  const out = { ...fields };
  sch.fields.forEach(fd => {
    if (fd.default === undefined) return;
    if (fd.required) return; // required fields must always be emitted
    const v = out[fd.key];
    if (v === fd.default) delete out[fd.key];
  });
  return out;
}

function emitBlock(n){
  const sch = getSchema(n);
  const blockKw = n.isData ? "data" : "resource";
  const lines = [];
  const f = stripDefaults(sch, n.fields);
  const incomingByKind = {};
  state.edges.filter(e => e.to === n.id).forEach(e => {
    (incomingByKind[e.kind] = incomingByKind[e.kind] || []).push(getNode(e.from));
  });

  lines.push(`${blockKw} "${n.type}" "${tfId(n)}" {`);

  if (sch.isGeneric){
    if (sch.isDataSource){
      pushIfSet(lines, "ext_id",   f.ext_id,   "string", 1);
      pushIfSet(lines, "filter",   f.filter,   "string", 1);
      pushIfSet(lines, "limit",    f.limit,    "number", 1);
      pushIfSet(lines, "page",     f.page,     "number", 1);
      pushIfSet(lines, "order_by", f.order_by, "string", 1);
      pushIfSet(lines, "select",   f.select,   "string", 1);
      if (f._extra && String(f._extra).trim()){
        String(f._extra).split("\n").forEach(ln => lines.push(`${indent(1)}${ln}`));
      } else if (!f.ext_id && !f.filter && !f.limit && !f.page && !f.order_by && !f.select){
        lines.push(`${indent(1)}# look up by ext_id or set a $filter`);
      }
    } else {
      if (f._body && f._body.trim()){
        f._body.split("\n").forEach(ln => lines.push(`${indent(1)}${ln}`));
      } else {
        lines.push(`${indent(1)}# configure arguments here`);
      }
    }
  } else if (n.type === "nutanix_vpc_v2"){
    pushIfSet(lines,"name",f.name,"string",1);
    pushIfSet(lines,"description",f.description,"string",1);
    pushIfSet(lines,"vpc_type",f.vpc_type,"string",1);
    pushIfSet(lines,"external_routing_domain_reference",f.external_routing_domain_reference,"string",1);
    emitSubBlocksFor(lines, 1, n);
  }
  else if (n.type === "nutanix_subnet_v2"){
    pushIfSet(lines,"name",f.name,"string",1);
    pushIfSet(lines,"description",f.description,"string",1);
    pushIfSet(lines,"subnet_type",f.subnet_type,"string",1);
    pushIfSet(lines,"network_id",f.network_id,"number",1);
    pushIfSet(lines,"cluster_reference",f.cluster_reference,"string",1);
    pushIfSet(lines,"is_external",f.is_external,"bool",1);
    pushIfSet(lines,"is_nat_enabled",f.is_nat_enabled,"bool",1);
    if (f.ip_prefix && !f._ip_config){
      const [base, mask] = f.ip_prefix.split("/");
      lines.push(`${indent(1)}ip_config {`);
      lines.push(`${indent(2)}ipv4 {`);
      lines.push(`${indent(3)}ip_subnet {`);
      lines.push(`${indent(4)}prefix_length = ${Number(mask || 24)}`);
      lines.push(`${indent(4)}ip {`);
      lines.push(`${indent(5)}value = "${base}"`);
      lines.push(`${indent(4)}}`);
      lines.push(`${indent(3)}}`);
      lines.push(`${indent(2)}}`);
      lines.push(`${indent(1)}}`);
    }
    const vpcRefs = incomingByKind.vpc_reference;
    if (vpcRefs && vpcRefs[0]) lines.push(`${indent(1)}vpc_reference = ${refFor(vpcRefs[0])}.id`);
    emitSubBlocksFor(lines, 1, n);
    appendCategories(lines, incomingByKind.categories, 1);
  }
  else if (n.type === "nutanix_images_v2"){
    pushIfSet(lines,"name",f.name,"string",1);
    pushIfSet(lines,"description",f.description,"string",1);
    pushIfSet(lines,"type",f.image_type,"string",1);
    const st = f.source_type || "url";
    if (st === "vm_disk" && f.source_vm_disk_ext_id){
      lines.push(`${indent(1)}source {`);
      lines.push(`${indent(2)}vm_disk_source {`);
      lines.push(`${indent(3)}ext_id = ${JSON.stringify(f.source_vm_disk_ext_id)}`);
      lines.push(`${indent(2)}}`);
      lines.push(`${indent(1)}}`);
    } else if (st === "object_lite" && f.source_object_key){
      lines.push(`${indent(1)}source {`);
      lines.push(`${indent(2)}object_lite_source {`);
      lines.push(`${indent(3)}key = ${JSON.stringify(f.source_object_key)}`);
      lines.push(`${indent(2)}}`);
      lines.push(`${indent(1)}}`);
    } else if (f.source_url){
      lines.push(`${indent(1)}source {`);
      lines.push(`${indent(2)}url_source {`);
      lines.push(`${indent(3)}url = ${JSON.stringify(f.source_url)}`);
      if (f.source_should_allow_insecure_url) lines.push(`${indent(3)}should_allow_insecure_url = true`);
      if (f.source_basic_auth_username && f.source_basic_auth_password){
        lines.push(`${indent(3)}basic_auth {`);
        lines.push(`${indent(4)}username = ${JSON.stringify(f.source_basic_auth_username)}`);
        lines.push(`${indent(4)}password = ${JSON.stringify(f.source_basic_auth_password)}`);
        lines.push(`${indent(3)}}`);
      }
      lines.push(`${indent(2)}}`);
      lines.push(`${indent(1)}}`);
    }
    emitSubBlocksFor(lines, 1, n);
    appendCategories(lines, incomingByKind.categories, 1);
  }
  else if (n.type === "nutanix_volume_group_v2"){
    pushIfSet(lines,"name",f.name,"string",1);
    pushIfSet(lines,"description",f.description,"string",1);
    pushIfSet(lines,"cluster_reference",f.cluster_reference,"string",1);
    pushIfSet(lines,"protocol",f.protocol,"string",1);
    pushIfSet(lines,"sharing_status",f.sharing_status,"string",1);
    pushIfSet(lines,"target_name",f.target_name,"string",1);
    pushIfSet(lines,"usage_type",f.usage_type,"string",1);
    pushIfSet(lines,"is_hidden",f.is_hidden,"bool",1);
    emitSubBlocksFor(lines, 1, n);
  }
  else if (n.type === "nutanix_category_v2"){
    pushIfSet(lines,"key",f.key,"string",1);
    pushIfSet(lines,"value",f.value,"string",1);
    pushIfSet(lines,"type",f.type,"string",1);
    pushIfSet(lines,"description",f.description,"string",1);
  }
  else if (n.type === "nutanix_floating_ip_v2"){
    pushIfSet(lines,"name",f.name,"string",1);
    pushIfSet(lines,"description",f.description,"string",1);
    pushIfSet(lines,"vm_nic_reference",f.vm_nic_reference,"string",1);
    const vpcRefs = incomingByKind.vpc_reference;
    if (vpcRefs && vpcRefs[0]) lines.push(`${indent(1)}vpc_reference = ${refFor(vpcRefs[0])}.id`);
    const extRefs = incomingByKind.external_subnet_reference;
    if (extRefs && extRefs[0]) lines.push(`${indent(1)}external_subnet_reference = ${refFor(extRefs[0])}.id`);
  }
  else if (n.type === "nutanix_address_group_v2"){
    pushIfSet(lines,"name",f.name,"string",1);
    pushIfSet(lines,"description",f.description,"string",1);
    emitSubBlocksFor(lines, 1, n);
  }
  else if (n.type === "nutanix_service_groups_v2"){
    pushIfSet(lines,"name",f.name,"string",1);
    pushIfSet(lines,"description",f.description,"string",1);
    emitSubBlocksFor(lines, 1, n);
  }
  else if (n.type === "nutanix_storage_containers_v2"){
    pushIfSet(lines,"name",f.name,"string",1);
    pushIfSet(lines,"owner_ext_id",f.owner_ext_id,"string",1);
    pushIfSet(lines,"replication_factor",f.replication_factor,"number",1);
    pushIfSet(lines,"erasure_code",f.erasure_code,"string",1);
    pushIfSet(lines,"is_compression_enabled",f.is_compression_enabled,"bool",1);
    pushIfSet(lines,"is_inline_ec_enabled",f.is_inline_ec_enabled,"bool",1);
    pushIfSet(lines,"is_software_encryption_enabled",f.is_software_encryption_enabled,"bool",1);
    pushIfSet(lines,"affinity_host_ext_id",f.affinity_host_ext_id,"string",1);
  }
  else if (n.type === "nutanix_users_v2"){
    pushIfSet(lines,"username",f.username,"string",1);
    pushIfSet(lines,"user_type",f.user_type,"string",1);
    pushIfSet(lines,"display_name",f.display_name,"string",1);
    pushIfSet(lines,"first_name",f.first_name,"string",1);
    pushIfSet(lines,"last_name",f.last_name,"string",1);
    pushIfSet(lines,"email_id",f.email_id,"string",1);
    pushIfSet(lines,"password",f.password,"string",1);
    pushIfSet(lines,"is_force_reset_password",f.is_force_reset_password,"bool",1);
    pushIfSet(lines,"description",f.description,"string",1);
  }
  else if (n.type === "nutanix_roles_v2"){
    emitTypedFields(lines, 1, sch, f);
  }
  else if (n.type === "nutanix_virtual_machine_v2"){
    pushIfSet(lines,"name",f.name,"string",1);
    pushIfSet(lines,"description",f.description,"string",1);
    pushIfSet(lines,"num_sockets",f.num_sockets,"number",1);
    pushIfSet(lines,"num_cores_per_socket",f.num_cores_per_socket,"number",1);
    pushIfSet(lines,"num_threads_per_core",f.num_threads_per_core,"number",1);
    pushIfSet(lines,"num_numa_nodes",f.num_numa_nodes,"number",1);
    pushIfSet(lines,"memory_size_bytes",f.memory_size_bytes,"number",1);
    pushIfSet(lines,"machine_type",f.machine_type,"string",1);
    pushIfSet(lines,"hardware_clock_timezone",f.hardware_clock_timezone,"string",1);
    pushIfSet(lines,"is_branding_enabled",f.is_branding_enabled,"bool",1);
    pushIfSet(lines,"is_agent_vm",f.is_agent_vm,"bool",1);
    pushIfSet(lines,"is_vcpu_hard_pinning_enabled",f.is_vcpu_hard_pinning_enabled,"bool",1);
    pushIfSet(lines,"is_cpu_passthrough_enabled",f.is_cpu_passthrough_enabled,"bool",1);
    pushIfSet(lines,"is_memory_overcommit_enabled",f.is_memory_overcommit_enabled,"bool",1);
    pushIfSet(lines,"is_cpu_hotplug_enabled",f.is_cpu_hotplug_enabled,"bool",1);
    pushIfSet(lines,"is_scsi_controller_enabled",f.is_scsi_controller_enabled,"bool",1);
    pushIfSet(lines,"is_vga_console_enabled",f.is_vga_console_enabled,"bool",1);
    pushIfSet(lines,"is_gpu_console_enabled",f.is_gpu_console_enabled,"bool",1);
    pushIfSet(lines,"generation_uuid",f.generation_uuid,"string",1);
    pushIfSet(lines,"bios_uuid",f.bios_uuid,"string",1);
    pushIfSet(lines,"protection_type",f.protection_type,"string",1);
    pushIfSet(lines,"power_state",f.power_state,"string",1);
    if (f.enabled_cpu_features){
      const feats = f.enabled_cpu_features.split(",").map(s=>s.trim()).filter(Boolean);
      if (feats.length) lines.push(`${indent(1)}enabled_cpu_features = [${feats.map(s=>JSON.stringify(s)).join(", ")}]`);
    }
    if (f.cluster_reference){
      lines.push(`${indent(1)}cluster {`);
      lines.push(`${indent(2)}ext_id = ${JSON.stringify(f.cluster_reference)}`);
      lines.push(`${indent(1)}}`);
    }
    // Edge-based simple NICs only when no rich _nics sub-block defined.
    if (!(f._nics && f._nics.length)){
      (incomingByKind["nics.subnet"] || []).forEach(sn => {
        lines.push(`${indent(1)}nics {`);
        lines.push(`${indent(2)}network_info {`);
        lines.push(`${indent(3)}subnet {`);
        lines.push(`${indent(4)}ext_id = ${refFor(sn)}.id`);
        lines.push(`${indent(3)}}`);
        lines.push(`${indent(2)}}`);
        lines.push(`${indent(1)}}`);
      });
    }
    // Edge-based simple disks only when no rich _disks sub-block defined.
    if (!(f._disks && f._disks.length)){
      (incomingByKind["disks.image"] || []).forEach(img => {
        lines.push(`${indent(1)}disks {`);
        lines.push(`${indent(2)}backing_info {`);
        lines.push(`${indent(3)}vm_disk {`);
        lines.push(`${indent(4)}data_source {`);
        lines.push(`${indent(5)}reference {`);
        lines.push(`${indent(6)}image_reference {`);
        lines.push(`${indent(7)}image_ext_id = ${refFor(img)}.id`);
        lines.push(`${indent(6)}}`);
        lines.push(`${indent(5)}}`);
        lines.push(`${indent(4)}}`);
        lines.push(`${indent(3)}}`);
        lines.push(`${indent(2)}}`);
        lines.push(`${indent(1)}}`);
      });
      (incomingByKind["disks.volume_group"] || []).forEach(vg => {
        lines.push(`${indent(1)}disks {`);
        lines.push(`${indent(2)}backing_info {`);
        lines.push(`${indent(3)}adfs_volume_group_reference {`);
        lines.push(`${indent(4)}volume_group_ext_id = ${refFor(vg)}.id`);
        lines.push(`${indent(3)}}`);
        lines.push(`${indent(2)}}`);
        lines.push(`${indent(1)}}`);
      });
    }
    emitSubBlocksFor(lines, 1, n);
    appendCategories(lines, incomingByKind.categories, 1);
  }
  else if (!sch.isGeneric){
    // Catch-all for typed schemas that don't have a hand-written branch.
    emitTypedFields(lines, 1, sch, f);
    emitSubBlocksFor(lines, 1, n);
    appendCategories(lines, incomingByKind.categories, 1);
  }

  // Generic depends_on for any incoming "depends_on" edges
  const dep = (incomingByKind.depends_on || []);
  if (dep.length){
    lines.push(`${indent(1)}depends_on = [`);
    dep.forEach(d => lines.push(`${indent(2)}${refFor(d)},`));
    lines.push(`${indent(1)}]`);
  }

  lines.push(`}`);
  return lines;
}

function appendCategories(lines, cats, lvl){
  if (!cats || !cats.length) return;
  lines.push(`${indent(lvl)}categories = [`);
  cats.forEach(c => lines.push(`${indent(lvl+1)}{ ext_id = ${refFor(c)}.id },`));
  lines.push(`${indent(lvl)}]`);
}
function appendRaw(lines, raw, lvl){
  if (!raw || !String(raw).trim()) return;
  String(raw).split("\n").forEach(ln => lines.push(`${indent(lvl)}${ln}`));
}

function renderCodePanel(body){
  const code = generateTerraform();
  body.innerHTML = `
    <div class="code-toolbar">
      <div class="meta">
        <b>main.tf</b> · ${state.nodes.filter(n=>!n.isData && n.type!=="nutanix").length} resources · ${state.nodes.filter(n=>n.isData).length} data · ${state.edges.length} link${state.edges.length===1?"":"s"}
      </div>
      <div class="code-toolbar-actions">
        <button class="btn ghost" id="btnCopy">Copy</button>
        <button class="btn primary" id="btnDownload">Download</button>
      </div>
    </div>
    <div class="code-panel"><pre>${highlight(code)}</pre></div>`;
  document.getElementById("btnCopy").addEventListener("click", () => navigator.clipboard.writeText(code).then(() => toast("Copied to clipboard")));
  document.getElementById("btnDownload").addEventListener("click", downloadTf);
}

function highlight(src){
  const e = s => s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  return src.split("\n").map(line => {
    if (/^\s*#/.test(line)) return `<span class="tk-comment">${e(line)}</span>`;
    let out = e(line);
    out = out.replace(/"([^"]*)"/g, '<span class="tk-string">"$1"</span>');
    out = out.replace(/\b(terraform|provider|resource|data|required_providers)\b/g, '<span class="tk-keyword">$1</span>');
    out = out.replace(/\b(true|false|null)\b/g, '<span class="tk-bool">$1</span>');
    out = out.replace(/(?<!\w)(\d+(?:\.\d+)?)(?!\w)/g, '<span class="tk-number">$1</span>');
    out = out.replace(/\b(nutanix(?:_[a-z0-9_]+)?)\b/g, '<span class="tk-resource">$1</span>');
    out = out.replace(/(\bresource\b\s*<span class="tk-string">"[^"]+"<\/span>\s*)<span class="tk-string">"([^"]+)"<\/span>/, '$1<span class="tk-name">"$2"</span>');
    out = out.replace(/(\bdata\b\s*<span class="tk-string">"[^"]+"<\/span>\s*)<span class="tk-string">"([^"]+)"<\/span>/, '$1<span class="tk-name">"$2"</span>');
    out = out.replace(/(\.[a-z_]+)(\.id)/g, '<span class="tk-ref">$1$2</span>');
    out = out.replace(/(^\s*)([a-z_][a-z0-9_]*)(\s*=)/gmi, '$1<span class="tk-attr">$2</span>$3');
    return out;
  }).join("\n");
}

function mkNode(type, isData, x, y, fields){
  const id = uid();
  const sch = getSchema(type, isData);
  const def = {};
  sch.fields.forEach(f => { if (f.default !== undefined) def[f.key] = f.default; });
  if (type === "nutanix_virtual_machine_v2"){
    def._nics = []; def._disks = []; def._serial_ports = []; def._cd_roms = []; def._gpus = [];
  }
  const node = { id, type, isData, x, y, fields: { ...def, ...fields }, parentId: null };
  state.nodes.push(node);
  return node;
}

function downloadTf(){
  const code = generateTerraform();
  const blob = new Blob([code], { type:"text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "main.tf";
  a.click();
  URL.revokeObjectURL(url);
  toast("Downloaded main.tf");
}

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

/* ===========================================================
   PROVIDER (top-bar dropdown + inspector empty-state form)
=========================================================== */
const pcSelect = document.getElementById("pcVersionSelect");
const pcPin    = document.getElementById("pcVersionPin");
function refreshPcPin(){
  const pin = PC_TO_PROVIDER_PIN[state.provider.pc_version] || "—";
  const constraint = PC_TO_PROVIDER[state.provider.pc_version] || "—";
  pcPin.textContent = `${constraint} · ${pin}`;
}
pcSelect.value = state.provider.pc_version;

/* Pop the provider settings form open in the right pane. */
function showProviderInInspector(){
  selectNode(null);
  if (state.tab !== "props"){
    document.querySelectorAll(".insp-tab").forEach(x => x.classList.remove("active"));
    document.querySelector('.insp-tab[data-tab="props"]').classList.add("active");
    state.tab = "props";
  }
  renderInspector();
}

// Touching the version dropdown at all (mousedown/focus) opens provider settings in the right pane,
// so users see the full form the moment they reach for the picker.
["mousedown","focus"].forEach(evt => pcSelect.addEventListener(evt, showProviderInInspector));

pcSelect.addEventListener("change", () => {
  state.provider.pc_version = pcSelect.value;
  refreshPcPin();
  // Make sure the form is still showing (covers programmatic changes too).
  if (!state.selectedId && state.tab === "props"){
    const pcField = document.querySelector('#providerFields [data-key="pc_version"]');
    if (pcField) pcField.value = state.provider.pc_version;
    const heroType = document.querySelector(".insp-hero .insp-type");
    if (heroType) heroType.innerHTML = `<b>provider "nutanix"</b> · ${escapeHtml(state.provider.pc_version)}`;
  } else {
    showProviderInInspector();
  }
  if (state.tab === "code") renderInspector();
});

document.getElementById("btnProviderSettings").addEventListener("click", showProviderInInspector);

/* ===========================================================
   BOOT
=========================================================== */
renderPalette();
renderNodes();
renderInspector();
applyTransform();
refreshPcPin();
</script>
</body>
</html>
