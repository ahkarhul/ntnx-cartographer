<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nutanix · Terraform Cartographer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=JetBrains+Mono:wght@300..700&family=Familjen+Grotesk:wght@400..700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#ecead8;
    --ink-dim:#a8a48f;
    --ink-faint:#6a6754;
    --paper:#f1ead4;
    --bg:#0b0d12;
    --bg-2:#10131a;
    --bg-3:#161a23;
    --line:#262b38;
    --line-soft:#1c2030;
    --grid:rgba(212,165,116,.045);
    --grid-strong:rgba(212,165,116,.10);
    --amber:#d4a574;
    --amber-hot:#e8b478;
    --ice:#7dd3fc;
    --ice-deep:#38bdf8;
    --jade:#7fcb9a;
    --coral:#e8826b;
    --lilac:#b8a8d9;
    --bone:#e8dfc6;
    --rose:#d98e95;
    --shadow-deep: 0 24px 48px -16px rgba(0,0,0,.75), 0 4px 16px -4px rgba(0,0,0,.5);
    --shadow-soft: 0 2px 8px -2px rgba(0,0,0,.4);
  }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; padding:0; }
  body{
    background:
      radial-gradient(1200px 700px at 70% -10%, rgba(125,211,252,.05), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(212,165,116,.05), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:"Familjen Grotesk", system-ui, sans-serif;
    font-size:13px;
    line-height:1.5;
    overflow:hidden;
    letter-spacing:.005em;
  }

  /* ---------- TOP BAR ---------- */
  .topbar{
    height:54px;
    display:grid;
    grid-template-columns: 300px 1fr auto;
    align-items:center;
    border-bottom:1px solid var(--line);
    padding:0 18px 0 22px;
    background:linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    position:relative;
    z-index:5;
  }
  .topbar::after{
    content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
    background:linear-gradient(90deg, transparent, rgba(212,165,116,.5) 12%, rgba(125,211,252,.4) 60%, transparent);
    opacity:.35;
  }
  .brand{ display:flex; align-items:baseline; gap:14px; }
  .brand-mark{ width:24px; height:24px; transform:translateY(2px); }
  .brand-mark svg{ width:100%; height:100%; }
  .brand-name{
    font-family:"Fraunces", serif;
    font-weight:300;
    font-size:21px;
    font-style:italic;
    letter-spacing:.01em;
    color:var(--paper);
  }
  .brand-name b{ font-weight:600; font-style:normal; color:var(--amber); }
  .brand-tag{
    font-family:"JetBrains Mono", monospace;
    font-size:9.5px;
    text-transform:uppercase;
    letter-spacing:.22em;
    color:var(--ink-dim);
    padding:3px 7px;
    border:1px solid var(--line);
    border-radius:2px;
    background:var(--bg-3);
  }
  .topbar-center{
    display:flex; gap:6px; justify-content:center; align-items:center;
    font-family:"JetBrains Mono", monospace;
    font-size:10.5px;
    color:var(--ink-dim);
    letter-spacing:.18em;
    text-transform:uppercase;
  }
  .topbar-center .crumb{ color:var(--ink-faint); }
  .topbar-center .sep{ color:var(--line); }
  .topbar-actions{ display:flex; gap:6px; align-items:center; }
  .topbar-pc-group{
    display:flex; align-items:center; gap:10px;
    margin-right:4px;
  }
  .topbar-pc-heading{
    font-family:"JetBrains Mono", monospace;
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:.22em;
    color:var(--ink-faint);
    cursor:pointer;
    transition: color .15s ease;
    user-select:none;
  }
  .topbar-pc-heading:hover{ color:var(--amber); }
  .topbar-pc{
    display:flex; align-items:center; gap:8px;
    padding:5px 10px 5px 12px;
    border:1px solid var(--line);
    border-radius:3px;
    background:var(--bg-3);
    font-family:"JetBrains Mono", monospace;
    font-size:10.5px;
    color:var(--ink-dim);
  }
  .topbar-pc-label{
    text-transform:uppercase; letter-spacing:.22em;
    font-size:9px; color:var(--ink-faint);
  }
  .topbar-pc select{
    appearance:none; -webkit-appearance:none;
    background:transparent; border:none; outline:none;
    color:var(--paper);
    font-family:"JetBrains Mono", monospace;
    font-size:11px;
    padding-right:14px;
    cursor:pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%236a6754'/></svg>");
    background-repeat:no-repeat;
    background-position: right center;
  }
  .topbar-pc select:hover{ color:var(--amber-hot); }
  .topbar-pc-pin{
    color:var(--ink-faint);
    font-size:9.5px;
    border-left:1px solid var(--line);
    padding-left:8px;
    letter-spacing:.06em;
  }
  .btn{
    appearance:none; border:1px solid var(--line);
    background:var(--bg-3); color:var(--ink);
    font-family:"JetBrains Mono", monospace; font-size:10.5px;
    text-transform:uppercase; letter-spacing:.16em;
    padding:8px 13px; border-radius:3px; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px;
    transition: border-color .15s ease, background .15s ease, color .15s ease, transform .08s ease;
  }
  .btn:hover{ border-color:var(--amber); color:var(--amber-hot); background:#1a1d29; }
  .btn:active{ transform:translateY(1px); }
  .btn.primary{
    background:linear-gradient(180deg, #211b10 0%, #1a1308 100%);
    border-color:#5a4324; color:var(--amber-hot);
  }
  .btn.primary:hover{ border-color:var(--amber); color:#fff2dc; box-shadow:0 0 0 1px rgba(212,165,116,.2), inset 0 0 20px rgba(212,165,116,.08); }
  .btn.ghost{ background:transparent; }
  .btn .ico{ width:12px; height:12px; }

  /* ---------- LAYOUT ---------- */
  .workspace{
    display:grid;
    grid-template-columns: 300px 1fr 400px;
    height:calc(100vh - 54px - 26px);
    overflow:hidden;
  }

  /* ---------- PALETTE ---------- */
  .palette{
    background:var(--bg-2);
    border-right:1px solid var(--line);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .palette-head{
    border-bottom:1px solid var(--line);
    background:var(--bg-2);
  }
  .palette-tabs{
    display:flex; gap:0;
    padding:0 12px;
    border-bottom:1px solid var(--line-soft);
  }
  .ptab{
    flex:1;
    background:none; border:none; color:var(--ink-faint);
    font-family:"JetBrains Mono", monospace;
    font-size:10px; text-transform:uppercase; letter-spacing:.2em;
    padding:13px 10px 12px; cursor:pointer;
    border-bottom:1px solid transparent;
    margin-bottom:-1px;
    transition: color .15s ease, border-color .15s ease;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .ptab:hover{ color:var(--ink-dim); }
  .ptab.active{ color:var(--amber); border-bottom-color:var(--amber); }
  .ptab-count{
    font-size:9px; color:var(--ink-faint);
    padding:1px 5px; border:1px solid var(--line);
    border-radius:8px;
  }
  .ptab.active .ptab-count{ color:var(--amber); border-color:var(--amber); }

  .palette-search{
    padding:10px 12px;
    border-bottom:1px solid var(--line-soft);
    position:relative;
  }
  .palette-search input{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--ink);
    padding:7px 10px 7px 30px;
    border-radius:3px;
    font-family:"JetBrains Mono", monospace;
    font-size:10.5px;
    letter-spacing:.04em;
    transition: border-color .15s ease;
  }
  .palette-search input::placeholder{ color:var(--ink-faint); }
  .palette-search input:focus{ outline:none; border-color:var(--amber); }
  .palette-search svg{
    position:absolute; left:21px; top:50%; transform:translateY(-50%);
    width:12px; height:12px; color:var(--ink-faint);
    pointer-events:none;
  }

  .palette-list{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
  }
  .palette-list::-webkit-scrollbar{ width:8px; }
  .palette-list::-webkit-scrollbar-track{ background:transparent; }
  .palette-list::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }

  .pal-section{ border-bottom:1px solid var(--line-soft); }
  .pal-head{
    padding:12px 16px 8px;
    display:flex; align-items:center; gap:8px;
    font-family:"JetBrains Mono", monospace;
    font-size:9.5px;
    text-transform:uppercase;
    letter-spacing:.22em;
    color:var(--ink-faint);
    cursor:pointer;
    user-select:none;
    transition: color .15s ease;
  }
  .pal-head:hover{ color:var(--ink-dim); }
  .pal-head .chev{
    width:8px; height:8px; transform:rotate(90deg);
    transition: transform .15s ease;
  }
  .pal-section.collapsed .pal-head .chev{ transform:rotate(0deg); }
  .pal-section.collapsed .pal-list{ display:none; }
  .pal-head .num{ color:var(--ink-faint); font-variant-numeric:tabular-nums; margin-left:auto; }
  .pal-head .cat-icon{ color:var(--accent, var(--amber)); width:11px; height:11px; }
  .pal-list{ padding:2px 8px 12px; display:flex; flex-direction:column; gap:4px; }
  .pal-item{
    background:var(--bg-3);
    border:1px solid var(--line-soft);
    border-radius:3px;
    padding:8px 11px 8px 13px;
    cursor:grab;
    display:grid;
    grid-template-columns: 22px 1fr;
    gap:9px;
    align-items:center;
    position:relative;
    transition: border-color .12s ease, transform .1s ease, background .12s ease;
  }
  .pal-item::before{
    content:""; position:absolute; left:0; top:6px; bottom:6px; width:2px;
    background:var(--accent, var(--amber));
    border-radius:0 2px 2px 0;
    opacity:.5;
  }
  .pal-item:hover{ border-color:var(--accent, var(--amber)); background:#181c27; }
  .pal-item:hover::before{ opacity:1; }
  .pal-item:active{ cursor:grabbing; transform:scale(.98); }
  .pal-icon{
    width:22px; height:22px;
    display:grid; place-items:center;
    color:var(--accent, var(--amber));
  }
  .pal-icon svg{ width:12px; height:12px; }
  .pal-meta{ display:flex; flex-direction:column; gap:0; min-width:0; }
  .pal-name{
    font-size:11.5px; color:var(--ink);
    text-overflow:ellipsis; overflow:hidden; white-space:nowrap;
  }
  .pal-type{
    font-family:"JetBrains Mono", monospace;
    font-size:9px;
    color:var(--ink-faint);
    letter-spacing:.02em;
    text-overflow:ellipsis; overflow:hidden; white-space:nowrap;
  }

  .pal-empty{
    padding:26px 18px;
    color:var(--ink-faint);
    font-family:"JetBrains Mono", monospace;
    font-size:10px;
    letter-spacing:.18em;
    text-transform:uppercase;
    text-align:center;
  }

  /* ---------- CANVAS ---------- */
  .canvas-wrap{
    position:relative;
    overflow:hidden;
    background: radial-gradient(circle at 50% 40%, #0e131c 0%, #07090d 100%);
  }
  .canvas-grid{
    position:absolute; inset:0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px),
      radial-gradient(var(--grid-strong) 1px, transparent 1px);
    background-size: 40px 40px, 40px 40px, 160px 160px;
    pointer-events:none;
    mask-image: radial-gradient(ellipse 90% 85% at 50% 50%, #000 60%, rgba(0,0,0,.4) 100%);
  }
  .canvas-vignette{
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse at top left, transparent 60%, rgba(0,0,0,.4)),
      radial-gradient(ellipse at bottom right, transparent 60%, rgba(0,0,0,.4));
  }
  .canvas-corners{ position:absolute; inset:14px; pointer-events:none; }
  .canvas-corners span{
    position:absolute; width:18px; height:18px;
    border-color: var(--line); border-style:solid; border-width:0;
  }
  .canvas-corners span.tl{ top:0; left:0; border-top-width:1px; border-left-width:1px; }
  .canvas-corners span.tr{ top:0; right:0; border-top-width:1px; border-right-width:1px; }
  .canvas-corners span.bl{ bottom:0; left:0; border-bottom-width:1px; border-left-width:1px; }
  .canvas-corners span.br{ bottom:0; right:0; border-bottom-width:1px; border-right-width:1px; }

  .canvas-stage{
    position:absolute; inset:0;
    transform-origin: 0 0;
  }
  .canvas-svg{
    position:absolute; inset:0;
    overflow:visible;
    pointer-events:none;
    width:100%; height:100%;
  }
  .canvas-svg .edge{
    fill:none; stroke:var(--ice); stroke-width:1.5;
    stroke-dasharray: 4 3;
    opacity:.6;
    pointer-events:stroke;
    cursor:pointer;
    transition: opacity .15s, stroke-width .15s;
  }
  .canvas-svg .edge:hover{ opacity:1; stroke-width:2.2; }
  .canvas-svg .edge.preview{
    stroke:var(--amber); opacity:.9; stroke-dasharray: 2 4;
  }
  .canvas-svg .edge-label{
    font-family:"JetBrains Mono", monospace;
    font-size:8.5px;
    fill:var(--ink-faint);
    letter-spacing:.1em;
    text-transform:uppercase;
    pointer-events:none;
  }
  .canvas-svg .edge-label-bg{ fill:var(--bg); pointer-events:none; }

  .nodes{ position:absolute; inset:0; pointer-events:none; }

  .select-box{
    position:absolute;
    border:1px dashed var(--amber);
    background:rgba(212,165,116,.07);
    pointer-events:none;
    border-radius:2px;
    box-shadow:0 0 0 1px rgba(212,165,116,.2) inset;
    z-index:2;
  }

  .node{
    position:absolute;
    pointer-events:auto;
    width:236px;
    background:linear-gradient(180deg, #161a23 0%, #11141d 100%);
    border:1px solid var(--line);
    border-radius:5px;
    box-shadow: var(--shadow-deep);
    user-select:none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .node::before{
    content:""; position:absolute; inset:-1px;
    border-radius:5px;
    pointer-events:none;
    background:linear-gradient(135deg, var(--accent), transparent 40%) border-box;
    -webkit-mask: linear-gradient(#000,#000) content-box, linear-gradient(#000,#000);
    -webkit-mask-composite: xor; mask-composite: exclude;
    opacity:.55;
  }
  .node.selected{ border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow-deep); }
  .node.selected::before{ opacity:1; }
  .node.is-data{ border-style: dashed; }
  .node-corner{
    position:absolute; width:6px; height:6px;
    border:1px solid var(--accent);
    background:var(--bg-2);
  }
  .node-corner.tl{ left:-3px; top:-3px; }
  .node-corner.tr{ right:-3px; top:-3px; }
  .node-corner.bl{ left:-3px; bottom:-3px; }
  .node-corner.br{ right:-3px; bottom:-3px; }

  .node-head{
    display:grid;
    grid-template-columns: 22px 1fr 22px;
    gap:10px;
    align-items:center;
    padding:9px 10px 9px 12px;
    border-bottom:1px solid var(--line-soft);
    cursor:grab;
    background:linear-gradient(90deg, rgba(255,255,255,.02), transparent);
  }
  .node-head:active{ cursor:grabbing; }
  .node-icon{ color:var(--accent); display:grid; place-items:center; }
  .node-icon svg{ width:14px; height:14px; }
  .node-title{ display:flex; flex-direction:column; min-width:0; gap:1px; }
  .node-name{
    font-family:"Fraunces", serif;
    font-weight:500;
    font-size:13.5px;
    color:var(--paper);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .node-type{
    font-family:"JetBrains Mono", monospace;
    font-size:9px;
    color:var(--ink-faint);
    letter-spacing:.06em;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .node-type .badge{
    color: var(--accent);
    border:1px solid var(--accent);
    padding:0 3px;
    border-radius:2px;
    margin-right:4px;
    font-size:8px;
    letter-spacing:.18em;
    opacity:.7;
  }
  .node-port{
    width:14px; height:14px;
    border:1px solid var(--accent);
    border-radius:50%;
    background:var(--bg);
    cursor:crosshair;
    position:relative;
    transition: transform .12s ease, background .12s ease;
  }
  .node-port:hover{ background:var(--accent); transform:scale(1.2); }
  .node-port.connecting{ background:var(--amber); border-color:var(--amber); box-shadow:0 0 0 4px rgba(212,165,116,.2); }

  /* nested children */
  .nodes > .node{ width:auto; min-width:260px; }
  .node-children{
    display:flex; flex-direction:column; gap:8px;
    padding:10px 12px 12px;
    border-top:1px dashed var(--line-soft);
    background:rgba(0,0,0,.18);
  }
  .node-children:empty{ display:none; }
  .node-children-stub{
    font-family:"JetBrains Mono", monospace;
    font-size:9px; color:var(--ink-faint);
    letter-spacing:.2em; text-transform:uppercase;
    text-align:center; padding:14px 8px;
    border:1px dashed var(--line);
    border-radius:3px;
    opacity:.55;
  }
  .node.is-child{
    position:relative; left:auto !important; top:auto !important;
    width:auto; min-width:0;
    box-shadow: var(--shadow-soft);
  }
  /* depth tints */
  .node.depth-1{ background:linear-gradient(180deg, #181c27 0%, #131722 100%); }
  .node.depth-2{ background:linear-gradient(180deg, #1a1f2b 0%, #161a25 100%); }
  .node.depth-3{ background:linear-gradient(180deg, #1c2230 0%, #181d28 100%); }

  /* chips for non-containment refs (e.g. categories) */
  .node-chips{
    display:flex; flex-wrap:wrap; gap:5px;
    padding:0 12px 10px;
  }
  .node-chip{
    font-family:"JetBrains Mono", monospace;
    font-size:9.5px;
    padding:2px 8px;
    border:1px solid var(--lilac);
    color:var(--lilac);
    border-radius:10px;
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(184,168,217,.05);
    opacity:.85;
    transition: opacity .15s, background .15s;
  }
  .node-chip:hover{ opacity:1; background:rgba(184,168,217,.1); }
  .node-chip .x{
    color:var(--ink-faint); cursor:pointer; opacity:.7;
    font-size:13px; line-height:1; padding:0 2px;
  }
  .node-chip .x:hover{ color:var(--coral); opacity:1; }

  /* sub-block instances */
  .subblocks{ padding:6px 12px 4px; }
  .subblock{
    background:var(--bg);
    border:1px solid var(--line-soft);
    border-radius:3px;
    margin-bottom:5px;
    overflow:hidden;
  }
  .subblock-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 10px; cursor:pointer;
    font-family:"JetBrains Mono", monospace;
    font-size:10px;
    color:var(--ink-dim);
    letter-spacing:.04em;
    user-select:none;
  }
  .subblock-head:hover{ color:var(--ink); }
  .subblock-head .lbl{ display:flex; align-items:center; gap:6px; }
  .subblock-head .lbl .ico{ color:var(--accent); width:11px; height:11px; }
  .subblock-head .lbl b{ color:var(--ink); font-weight:500; }
  .subblock-head .chev{ width:8px; height:8px; transform:rotate(90deg); transition: transform .15s; color:var(--ink-faint); }
  .subblock.collapsed .subblock-head .chev{ transform:rotate(0deg); }
  .subblock.collapsed .subblock-body{ display:none; }
  .subblock-body{
    padding:8px 10px 10px;
    border-top:1px dashed var(--line-soft);
  }
  .subblock-body .field{ grid-template-columns:96px 1fr; margin-bottom:7px; }
  .subblock-rm{
    background:none; border:none; color:var(--ink-faint);
    cursor:pointer; padding:2px 6px;
    font-size:14px; line-height:1;
  }
  .subblock-rm:hover{ color:var(--coral); }

  .subblock-add{
    display:flex; flex-wrap:wrap; gap:5px;
    padding:4px 12px 12px;
  }
  .subblock-add button{
    background:transparent;
    border:1px dashed var(--line);
    color:var(--ink-faint);
    font-family:"JetBrains Mono", monospace;
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:.14em;
    padding:5px 9px;
    border-radius:2px;
    cursor:pointer;
    transition: color .15s, border-color .15s;
  }
  .subblock-add button:hover{ color:var(--amber); border-color:var(--amber); }
  .subblock-add button::before{ content:"+ "; opacity:.5; }

  .node-body{ padding:10px 12px 12px; }
  .node-fact{
    display:flex; justify-content:space-between; gap:10px;
    font-family:"JetBrains Mono", monospace;
    font-size:10px;
    color:var(--ink-dim);
    padding:3px 0;
    letter-spacing:.04em;
  }
  .node-fact .k{ color:var(--ink-faint); text-transform:uppercase; letter-spacing:.14em; font-size:9px; }
  .node-fact .v{ color:var(--ink); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60%; }
  .node-fact .v.muted{ color:var(--ink-faint); font-style:italic; }
  .node-refs{
    margin-top:8px; padding-top:8px; border-top:1px dashed var(--line-soft);
    font-family:"JetBrains Mono", monospace;
    font-size:9.5px; color:var(--ink-faint); letter-spacing:.04em;
  }
  .node-refs .ref{
    display:flex; align-items:center; gap:6px;
    padding:2px 0; color:var(--ice);
  }
  .node-refs .ref .arrow{ color:var(--ink-faint); }

  /* ---------- CANVAS HUD ---------- */
  .canvas-hud{
    position:absolute; left:18px; bottom:18px;
    display:flex; gap:6px; align-items:center;
    background:rgba(11,13,18,.78); border:1px solid var(--line);
    backdrop-filter: blur(8px);
    padding:6px; border-radius:4px;
  }
  .canvas-hud button{
    background:transparent; border:none; color:var(--ink-dim);
    width:28px; height:28px; cursor:pointer; border-radius:3px;
    display:grid; place-items:center;
    transition: color .15s, background .15s;
  }
  .canvas-hud button:hover{ color:var(--amber); background:var(--bg-3); }
  .canvas-hud .zoom-label{
    font-family:"JetBrains Mono", monospace;
    font-size:10px; color:var(--ink-dim);
    padding:0 8px;
    letter-spacing:.14em;
    min-width:46px; text-align:center;
  }

  .canvas-stamp{
    position:absolute; right:22px; top:18px;
    font-family:"JetBrains Mono", monospace;
    font-size:9px;
    color:var(--ink-faint);
    text-transform:uppercase;
    letter-spacing:.24em;
    text-align:right;
    pointer-events:none;
    line-height:1.7;
  }
  .canvas-stamp b{ color:var(--ink-dim); font-weight:400; }
  .canvas-stamp .stamp-line{ display:flex; gap:10px; justify-content:flex-end; }
  .canvas-stamp .stamp-line span:first-child{ color:var(--ink-faint); }

  .empty-canvas{
    position:absolute; inset:0;
    display:grid; place-items:center;
    pointer-events:none;
  }
  .empty-canvas-inner{
    text-align:center; max-width:480px; padding:32px;
    color:var(--ink-faint);
  }
  .empty-canvas .stencil{
    font-family:"Fraunces", serif;
    font-style:italic;
    font-weight:300;
    font-size:38px;
    color:var(--ink-dim);
    margin-bottom:14px;
    letter-spacing:.01em;
  }
  .empty-canvas .stencil em{
    color:var(--amber); font-style:normal; font-weight:500;
  }
  .empty-canvas .hint{
    font-family:"JetBrains Mono", monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.22em;
    color:var(--ink-faint);
  }
  .empty-canvas .glyphs{
    margin-top:22px;
    display:flex; gap:18px; justify-content:center;
    color:var(--line);
  }
  .empty-canvas .glyphs svg{ width:18px; height:18px; }

  /* ---------- INSPECTOR ---------- */
  .inspector{
    background:var(--bg-2);
    border-left:1px solid var(--line);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .insp-tabs{
    display:flex;
    border-bottom:1px solid var(--line);
    padding:0 12px;
    gap:2px;
    background:var(--bg-2);
  }
  .insp-tab{
    background:none; border:none; color:var(--ink-faint);
    font-family:"JetBrains Mono", monospace;
    font-size:10px; text-transform:uppercase; letter-spacing:.22em;
    padding:14px 14px 13px; cursor:pointer;
    border-bottom:1px solid transparent;
    margin-bottom:-1px;
    transition: color .15s ease, border-color .15s ease;
  }
  .insp-tab:hover{ color:var(--ink-dim); }
  .insp-tab.active{ color:var(--amber); border-bottom-color:var(--amber); }
  .insp-body{ flex:1; overflow-y:auto; }
  .insp-body::-webkit-scrollbar{ width:8px; }
  .insp-body::-webkit-scrollbar-track{ background:transparent; }
  .insp-body::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }

  .insp-multi-banner{
    display:flex; align-items:center; gap:10px;
    padding:14px 22px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(212,165,116,.06), transparent);
  }
  .insp-multi-banner .multi-count{
    font-family:"Fraunces", serif;
    font-size:18px;
    font-style:italic;
    color:var(--paper);
  }
  .insp-section-wrap.with-sep{
    border-top:1px dashed var(--line);
    margin-top:14px;
  }

  .insp-empty{
    padding:48px 24px;
    text-align:center;
    color:var(--ink-faint);
    font-family:"JetBrains Mono", monospace;
    font-size:10px;
    letter-spacing:.22em;
    text-transform:uppercase;
  }
  .insp-empty svg{ width:36px; height:36px; opacity:.4; margin-bottom:14px; }

  .insp-hero{
    padding:18px 22px 16px;
    border-bottom:1px solid var(--line-soft);
    background:linear-gradient(180deg, rgba(255,255,255,.015), transparent);
    position:relative;
  }
  .insp-hero::before{
    content:""; position:absolute; left:0; top:14px; bottom:14px; width:2px;
    background:var(--accent); border-radius:0 2px 2px 0;
  }
  .insp-hero h2{
    font-family:"Fraunces", serif;
    font-weight:400;
    font-size:22px;
    margin:0 0 4px;
    color:var(--paper);
    letter-spacing:-.005em;
  }
  .insp-hero .insp-type{
    font-family:"JetBrains Mono", monospace;
    font-size:10px;
    color:var(--ink-faint);
    letter-spacing:.06em;
  }
  .insp-hero .insp-type b{ color:var(--accent); font-weight:400; }
  .insp-hero .kind-pill{
    display:inline-block;
    font-family:"JetBrains Mono", monospace;
    font-size:9px;
    color:var(--accent);
    border:1px solid var(--accent);
    padding:1px 6px;
    border-radius:2px;
    margin-right:8px;
    letter-spacing:.18em;
    opacity:.85;
  }

  .insp-section{ padding:14px 22px 6px; }
  .insp-section h3{
    font-family:"JetBrains Mono", monospace;
    font-size:9.5px;
    text-transform:uppercase;
    letter-spacing:.24em;
    color:var(--ink-faint);
    margin:0 0 12px;
    padding-bottom:6px;
    border-bottom:1px dashed var(--line-soft);
  }
  .field{
    display:grid;
    grid-template-columns: 110px 1fr;
    gap:10px;
    align-items:center;
    margin-bottom:10px;
  }
  .field label{
    font-family:"JetBrains Mono", monospace;
    font-size:10px;
    color:var(--ink-dim);
    letter-spacing:.04em;
  }
  .field label .req{ color:var(--coral); margin-left:2px; }
  .field input, .field select, .field textarea{
    appearance:none;
    width:100%;
    background:var(--bg);
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:3px;
    padding:7px 9px;
    font-family:"JetBrains Mono", monospace;
    font-size:11px;
    transition: border-color .15s ease, background .15s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color:var(--accent);
    background:#0d0f15;
  }
  .field textarea{ resize:vertical; min-height:60px; }
  .field.full{ grid-template-columns: 1fr; }
  .field.full label{ margin-bottom:4px; }
  .field-hint{
    grid-column: 2;
    font-family:"JetBrains Mono", monospace;
    font-size:9px;
    color:var(--ink-faint);
    letter-spacing:.04em;
    margin-top:-6px; margin-bottom:8px;
  }
  .field.full .field-hint{ grid-column: 1; }

  .insp-actions{
    padding:14px 22px 22px;
    display:flex; gap:8px;
    border-top:1px dashed var(--line-soft);
    margin-top:10px;
  }
  .insp-actions .btn{ flex:1; justify-content:center; }
  .btn.danger{ border-color:#3a1f1f; color:var(--coral); }
  .btn.danger:hover{ border-color:var(--coral); color:#fff2ee; background:#1a0d0d; }

  /* ---------- CODE PANEL ---------- */
  .code-panel{
    flex:1; overflow:auto;
    background:#080a0e;
    font-family:"JetBrains Mono", monospace;
    font-size:11.5px;
    line-height:1.65;
    padding:18px 22px;
    color:var(--ink);
  }
  .code-panel::-webkit-scrollbar{ width:8px; height:8px; }
  .code-panel::-webkit-scrollbar-track{ background:transparent; }
  .code-panel::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  .code-panel pre{ margin:0; white-space:pre; }
  .tk-keyword{ color:var(--lilac); }
  .tk-resource{ color:var(--amber-hot); }
  .tk-name{ color:var(--ice); }
  .tk-attr{ color:var(--ink); }
  .tk-string{ color:var(--bone); }
  .tk-number{ color:var(--jade); }
  .tk-bool{ color:var(--rose); }
  .tk-comment{ color:var(--ink-faint); font-style:italic; }
  .tk-ref{ color:var(--ice-deep); }
  .tk-brace{ color:var(--ink-dim); }

  .code-toolbar{
    padding:10px 14px;
    border-bottom:1px solid var(--line-soft);
    display:flex; align-items:center; justify-content:space-between;
    background:var(--bg-2);
  }
  .code-toolbar .meta{
    font-family:"JetBrains Mono", monospace;
    font-size:9px;
    color:var(--ink-faint);
    text-transform:uppercase;
    letter-spacing:.22em;
  }
  .code-toolbar .meta b{ color:var(--ink-dim); font-weight:400; }
  .code-toolbar-actions{ display:flex; gap:6px; }
  .code-toolbar-actions .btn{ padding:6px 10px; font-size:9.5px; }

  /* ---------- STATUS BAR ---------- */
  .statusbar{
    position:fixed; bottom:0; left:0; right:0;
    height:26px;
    background:var(--bg-2);
    border-top:1px solid var(--line);
    display:flex; align-items:center;
    padding:0 18px;
    font-family:"JetBrains Mono", monospace;
    font-size:9.5px;
    color:var(--ink-faint);
    text-transform:uppercase;
    letter-spacing:.2em;
    gap:18px;
    z-index:5;
  }
  .statusbar .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--jade);
    box-shadow: 0 0 8px var(--jade);
    margin-right:6px; display:inline-block;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; box-shadow: 0 0 6px var(--jade); }
    50%{ opacity:.5; box-shadow: 0 0 12px var(--jade); }
  }
  .statusbar .right{ margin-left:auto; display:flex; gap:18px; }
  .statusbar b{ color:var(--ink-dim); font-weight:400; }

  /* toast & banner */
  .toast{
    position:fixed; bottom:48px; left:50%; transform:translateX(-50%);
    background:var(--bg-3); border:1px solid var(--amber);
    color:var(--paper);
    padding:10px 18px; border-radius:3px;
    font-family:"JetBrains Mono", monospace;
    font-size:10.5px;
    text-transform:uppercase; letter-spacing:.18em;
    box-shadow: var(--shadow-deep);
    z-index:9999;
    animation: toastIn .3s ease-out, toastOut .3s ease-in 1.6s forwards;
  }
  @keyframes toastIn{ from{ opacity:0; transform:translate(-50%, 8px); } to{ opacity:1; transform:translate(-50%, 0); } }
  @keyframes toastOut{ to{ opacity:0; transform:translate(-50%, -8px); } }
  .connect-banner{
    position:absolute; top:18px; left:50%; transform:translateX(-50%);
    background:rgba(11,13,18,.9); border:1px solid var(--amber);
    padding:8px 16px; border-radius:3px;
    font-family:"JetBrains Mono", monospace;
    font-size:10px; color:var(--amber-hot);
    text-transform:uppercase; letter-spacing:.22em;
    backdrop-filter: blur(6px);
    z-index:10;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 12 L12 3 L21 12 L12 21 Z" stroke="#d4a574"/>
        <path d="M7 12 L12 7 L17 12 L12 17 Z" stroke="#7dd3fc"/>
        <circle cx="12" cy="12" r="1.5" fill="#d4a574" stroke="none"/>
      </svg>

  <div class="topbar-center">

  <div class="topbar-actions">

          <option value="pc7.5.1+">pc7.5.1+</option>
          <option value="pc7.5">pc7.5</option>
          <option value="pc7.3+">pc7.3+</option>
          <option value="pc2024.3.1">pc2024.3.1</option>
          <option value="pc2024.3">pc2024.3</option>
          <option value="pc2023.x">pc2023.x</option>
          <option value="pc2022.6">pc2022.6</option>
          <option value="pc2022.4">pc2022.4</option>
          <option value="pc2022.1">pc2022.1</option>
          <option value="pc2021.9">pc2021.9</option>

        <span class="topbar-pc-pin" id="pcVersionPin">~&gt; 2.4</span>

    </div>
    <button class="btn ghost" id="btnLoadSample" title="Load a sample diagram">

    <button class="btn ghost" id="btnClear">
      <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l8 8M12 4l-8 8"/></svg>
      Clear
    </button>
    <button class="btn primary" id="btnExport">
      <svg class="ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v9M4 7l4 4 4-4M3 14h10"/></svg>
      Export .tf
    </button>
  </div>
</header>

<main class="workspace">
  <aside class="palette">
    <div class="palette-head">
      <div class="palette-tabs">
        <button class="ptab active" data-ptab="r">Resources <span class="ptab-count" id="countR">0</span></button>
        <button class="ptab" data-ptab="d">Data Sources <span class="ptab-count" id="countD">0</span></button>
      </div>
      <div class="palette-search">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
        <input id="paletteSearch" placeholder="search nutanix_…" autocomplete="off" />
      </div>
    </div>
    <div class="palette-list" id="paletteList"></div>
  </aside>

  <section class="canvas-wrap" id="canvasWrap">
    <div class="canvas-grid"></div>
    <div class="canvas-vignette"></div>
    <div class="canvas-corners"><span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span></div>

    <div class="canvas-stage" id="canvasStage">
      <svg class="canvas-svg" id="connSvg"></svg>
      <div class="nodes" id="nodesLayer"></div>
      <div class="select-box" id="selectBox" style="display:none"></div>
    </div>

    <div class="canvas-stamp">
      <div class="stamp-line"><span>SHEET</span><b id="stampSheet">01 / 01</b></div>
      <div class="stamp-line"><span>SCALE</span><b id="stampScale">1 : 1</b></div>
      <div class="stamp-line"><span>NODES</span><b id="stampNodes">0</b></div>
    </div>

    <div class="empty-canvas" id="emptyCanvas">
      <div class="empty-canvas-inner">
        <div class="stencil">draft your <em>infrastructure</em></div>
        <div class="hint">drag a resource or data source onto the canvas</div>
        <div class="glyphs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="4" y="4" width="16" height="16"/><path d="M4 12h16M12 4v16"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="8"/><path d="M4 12h16"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M3 12 L12 3 L21 12 L12 21Z"/></svg>
        </div>
      </div>
    </div>

    <div class="canvas-hud">
      <button id="zoomOut" title="Zoom out">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M4 8h8"/></svg>
      </button>
      <div class="zoom-label" id="zoomLabel">100%</div>
      <button id="zoomIn" title="Zoom in">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M8 4v8M4 8h8"/></svg>
      </button>
      <button id="zoomFit" title="Reset view">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M3 6V3h3M13 6V3h-3M3 10v3h3M13 10v3h-3"/></svg>
      </button>
    </div>
  </section>

  <aside class="inspector">
    <div class="insp-tabs">
      <button class="insp-tab active" data-tab="props">Properties</button>
      <button class="insp-tab" data-tab="code">Terraform</button>
    </div>
    <div class="insp-body" id="inspBody"></div>
  </aside>
</main>

<footer class="statusbar">
  <span><span class="dot"></span>READY</span>
  <span>RES <b id="statResources">0</b></span>
  <span>DATA <b id="statData">0</b></span>
  <span>EDGES <b id="statEdges">0</b></span>
  <span id="statSelected">SEL —</span>
  <div class="right">
    <span>X <b id="cursorX">0000</b> · Y <b id="cursorY">0000</b></span>
    <span>NUTANIX/TERRAFORM</span>
  </div>
</footer>

  foundation:`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 14h12M3 14V8l5-3 5 3v6M6 14V11h4v3"/></svg>`,

/* Heuristic: assign a category based on the type name. */
function inferCategory(type){
  const t = type;
  if (t === "nutanix") return "connection";
  if (/karbon/.test(t)) return "karbon";
  if (/^nutanix_ndb_/.test(t)) return "ndb";
  if (/^nutanix_pc_/.test(t)) return "pc";
  if (/^nutanix_lcm_/.test(t)) return "lcm";
  if (/^nutanix_foundation/.test(t)) return "foundation";
  if (/^nutanix_ngt_/.test(t)) return "ngt";
  if (/^nutanix_object_store/.test(t)) return "objects";
  if (/self_service/.test(t)) return "calm";
  if (/^nutanix_(ssl_certificate|key_management)/.test(t)) return "security";
  if (/^nutanix_(role|user|authorization|access_control|directory_service|saml|password_change|iam|permission)/.test(t)) return "iam";
  if (/^nutanix_(protection|recovery|promote_protected|restore_protected|protected_resource)/.test(t)) return "protect";
  if (/^nutanix_(image|images|image_placement)/.test(t)) return "image";
  if (/^nutanix_(volume|storage|associate_category_to_volume)/.test(t)) return "storage";
  if (/^nutanix_(cluster|host|stigs)/.test(t)) return "cluster";
  if (/^nutanix_(template|ova|deploy_template)/.test(t)) return "template";
  if (/(virtual_machine|^nutanix_vm_)/.test(t)) return "compute";
  if (/^nutanix_(category|entity_group)/.test(t)) return "category";
  if (/^nutanix_(network_security|service_group|address_group)/.test(t)) return "policy";
  if (/^nutanix_(floating_ip|route|static_routes|pbr)/.test(t)) return "fip";
  if (/^nutanix_(vpc|subnet|network_function|operation)/.test(t)) return "network";
  return "misc";
}

/* Convert a doc filename to a TF type name. */
function filenameToType(name){
  const base = name.replace(/\.html$/,"").replace(/\.markdown$/,"").replace(/\.html$/,"");
  return base.startsWith("nutanix_") ? base : `nutanix_${base}`;
}

/* Pretty label from type ("nutanix_virtual_machine_v2" → "Virtual Machine"). */
function humanize(type){
  const trimmed = type.replace(/^nutanix_/,"").replace(/_v2$/,"");
  return trimmed.split("_").map(w => {
    if (/^(vm|vpc|nic|os|iso|gpu|nfs|ec|cdrom|vlan|nat|ip|ipv4|ipv6|ovas?|ngt|pbr|pc|pe|sla|kms|ndb|lcm|saml|iam|ssl|tcp|udp|icmp|dr)$/i.test(w)) return w.toUpperCase();
    return w.charAt(0).toUpperCase() + w.slice(1);
  }).join(" ");
}

  { key:"_extra", label:"Extra Args (HCL)", type:"textarea", isRaw:true, placeholder:"# resource-specific args, e.g.:\n# cluster_ext_id = \"…\"\n# vm_ext_id      = \"…\"", hint:"Resource-specific args (e.g. cluster_ext_id, vm_ext_id)." },
];

/* Per-type overrides for data sources (rare — for ones that don't fit pagination pattern). */
const DATA_SCHEMAS = {};

function getCatalogEntry(type, isData){
  const list = isData ? CATALOG.d : CATALOG.r;
  return list.find(e => e.type === type);
}

function getSchema(typeOrNode, isData){
  const type = typeof typeOrNode === "string" ? typeOrNode : typeOrNode.type;
  const _isData = typeof typeOrNode === "string" ? !!isData : !!typeOrNode.isData;
  const cat = CATEGORIES[inferCategory(type)] || CATEGORIES.misc;
  if (_isData){
    const ds = DATA_SCHEMAS[type];
    if (ds) return ds;
    return {
      icon: cat.icon, accent: cat.accent,
      fields: DATA_SOURCE_FIELDS,
      isGeneric: true, isDataSource: true,
    };
  }
  const s = SCHEMAS[type];
  if (s) return s;
  return {
    icon: cat.icon, accent: cat.accent,
    fields: GENERIC_FIELDS,
    isGeneric: true,
  };
}

/* ===========================================================
   STATE
=========================================================== */
const state = {
  nodes: [], // { id, type, isData, x, y, fields }
  edges: [], // { id, from, to, kind }
  selectedIds: [],
  zoom: 1,
  pan: { x:0, y:0 },
  tab: "props",
  paletteTab: "r",
  paletteSearch: "",
  collapsed: new Set(),
  connecting: null,
  nextId: 1,
  provider: {
    pc_version: "pc7.5.1+",
    endpoint: "",
    username: "",
    password: "",
    port: 9440,
    insecure: false,
    wait_timeout: 1,
  },
};
// Back-compat: code that reads state.selectedId / writes state.selectedId = id|null
// continues to work (treats it as a primary single selection).
Object.defineProperty(state, "selectedId", {
  get(){ return this.selectedIds[0] || null; },
  set(v){ this.selectedIds = v ? [v] : []; },
});

function uid(){ return "n" + (state.nextId++).toString(36); }
function getNode(id){ return state.nodes.find(n => n.id === id); }
function tfName(s){ return (s||"unnamed").toLowerCase().replace(/[^a-z0-9_]+/g,"_").replace(/^_+|_+$/g,"") || "unnamed"; }
/* Common identifier fields found across the catalog. First match wins. */
const ID_FIELD_PRIORITY = [
  "name","display_name","app_name","template_name","database_name","cluster_name",
  "alias","username","filename","node_serial","action_name","patch_name",
  "ext_id","cluster_ext_id","vm_ext_id","user_ext_id","pc_ext_id","app_uuid",
  "snapshot_uuid","clone_id","database_id","time_machine_id","route_table_ext_id",
  "domain_manager_ext_id","object_store_ext_id","vg_ext_id","volume_group_ext_id",
  "_tf_label",
];
function pickIdentifier(fields){
  for (const k of ID_FIELD_PRIORITY){
    if (fields[k] !== undefined && fields[k] !== "" && fields[k] !== null) return String(fields[k]);
  }
  if (fields.key && fields.value) return `${fields.key}_${fields.value}`;
  return null;
}
function tfId(node){
  const sch = getSchema(node);
  if (sch.tfId) return tfName(sch.tfId(node.fields));
  if (sch.isGeneric) return tfName(node.fields._name);
  return tfName(pickIdentifier(node.fields) || "unnamed");
}
function displayName(node){
  const sch = getSchema(node);
  if (sch.displayName) return sch.displayName(node.fields);
  if (sch.isGeneric) return node.fields._name || humanize(node.type);
  return pickIdentifier(node.fields) || humanize(node.type);
}

/* ===========================================================
   PALETTE
=========================================================== */
const paletteListEl = document.getElementById("paletteList");
const paletteSearchEl = document.getElementById("paletteSearch");

function renderPalette(){
  const tab = state.paletteTab;
  const items = CATALOG[tab];
  const q = state.paletteSearch.trim().toLowerCase();
  const filtered = q ? items.filter(it => it.type.toLowerCase().includes(q) || humanize(it.type).toLowerCase().includes(q)) : items;

  // group by category
  const groups = {};
  CATEGORY_ORDER.forEach(k => groups[k] = []);
  filtered.forEach(it => { (groups[it.category] = groups[it.category] || []).push(it); });

  paletteListEl.innerHTML = "";
  if (!filtered.length){
    paletteListEl.innerHTML = `<div class="pal-empty">no matches</div>`;
    return;
  }

  CATEGORY_ORDER.forEach(catKey => {
    const list = groups[catKey];
    if (!list || !list.length) return;
    const catMeta = CATEGORIES[catKey];
    const sec = document.createElement("div");
    sec.className = "pal-section" + (state.collapsed.has(`${tab}:${catKey}`) ? " collapsed" : "");
    const head = document.createElement("div");
    head.className = "pal-head";
    head.style.setProperty("--accent", catMeta.accent);
    head.innerHTML = `${ICONS.chev}<span class="cat-icon">${ICONS[catMeta.icon] || ICONS.misc}</span><span>${catMeta.label}</span><span class="num">${String(list.length).padStart(2,"0")}</span>`;
    head.addEventListener("click", () => {
      const key = `${tab}:${catKey}`;
      if (state.collapsed.has(key)) state.collapsed.delete(key);
      else state.collapsed.add(key);
      renderPalette();
    });
    sec.appendChild(head);
    const ul = document.createElement("div");
    ul.className = "pal-list";
    list.forEach(it => {
      const sch = getSchema(it.type);
      const row = document.createElement("div");
      row.className = "pal-item";
      row.draggable = true;
      row.style.setProperty("--accent", sch.accent || catMeta.accent);
      row.innerHTML = `
        <div class="pal-icon">${ICONS[sch.icon || catMeta.icon] || ICONS.misc}</div>
        <div class="pal-meta">
          <span class="pal-name">${humanize(it.type)}</span>
          <span class="pal-type">${it.type}</span>
        </div>`;
      row.addEventListener("dragstart", e => {
        e.dataTransfer.setData("application/x-ntx-type", it.type);
        e.dataTransfer.setData("application/x-ntx-isdata", it.isData ? "1" : "0");
        e.dataTransfer.effectAllowed = "copy";
        const ghost = document.createElement("div");
        ghost.style.position="absolute"; ghost.style.top="-9999px";
        document.body.appendChild(ghost);
        e.dataTransfer.setDragImage(ghost, 0, 0);
        setTimeout(()=>ghost.remove(),0);
      });
      ul.appendChild(row);
    });
    sec.appendChild(ul);
    paletteListEl.appendChild(sec);
  });
}

document.querySelectorAll(".ptab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".ptab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    state.paletteTab = t.dataset.ptab;
    renderPalette();
  });
});
paletteSearchEl.addEventListener("input", e => {
  state.paletteSearch = e.target.value;
  renderPalette();
});

/* ===========================================================
   CANVAS — drop, drag, zoom, pan
=========================================================== */
const canvasWrap = document.getElementById("canvasWrap");
const stage = document.getElementById("canvasStage");
const nodesLayer = document.getElementById("nodesLayer");
const connSvg = document.getElementById("connSvg");
const emptyOverlay = document.getElementById("emptyCanvas");
const cursorXEl = document.getElementById("cursorX");
const cursorYEl = document.getElementById("cursorY");

function applyTransform(){
  stage.style.transform = `translate(${state.pan.x}px, ${state.pan.y}px) scale(${state.zoom})`;
  document.getElementById("zoomLabel").textContent = Math.round(state.zoom*100)+"%";
  document.getElementById("stampScale").textContent = "1 : " + (1/state.zoom).toFixed(2);
}

function clientToCanvas(clientX, clientY){
  const rect = canvasWrap.getBoundingClientRect();
  return {
    x: (clientX - rect.left - state.pan.x) / state.zoom,
    y: (clientY - rect.top - state.pan.y) / state.zoom,
  };
}

canvasWrap.addEventListener("dragover", e => {
  if (e.dataTransfer.types.includes("application/x-ntx-type")){
    e.preventDefault();
    e.dataTransfer.dropEffect = "copy";
  }
});
canvasWrap.addEventListener("drop", e => {
  const type = e.dataTransfer.getData("application/x-ntx-type");
  const isData = e.dataTransfer.getData("application/x-ntx-isdata") === "1";
  if (!type) return;
  e.preventDefault();
  const p = clientToCanvas(e.clientX, e.clientY);
  createNode(type, isData, p.x - 118, p.y - 28);
});

canvasWrap.addEventListener("mousemove", e => {
  const p = clientToCanvas(e.clientX, e.clientY);
  cursorXEl.textContent = String(Math.round(p.x)).padStart(4,"0");
  cursorYEl.textContent = String(Math.round(p.y)).padStart(4,"0");
});

let panning = null;
let boxSelect = null;
const selectBoxEl = document.getElementById("selectBox");

function updateSelectBoxStyle(){
  if (!boxSelect) return;
  const left = Math.min(boxSelect.sx, boxSelect.cx);
  const right = Math.max(boxSelect.sx, boxSelect.cx);
  const top = Math.min(boxSelect.sy, boxSelect.cy);
  const bottom = Math.max(boxSelect.sy, boxSelect.cy);
  selectBoxEl.style.left = left + "px";
  selectBoxEl.style.top = top + "px";
  selectBoxEl.style.width = (right - left) + "px";
  selectBoxEl.style.height = (bottom - top) + "px";
}
function rootNodesIntersectingBox(box){
  return state.nodes.filter(n => !n.parentId).filter(n => {
    const el = nodesLayer.querySelector(`.node[data-id="${n.id}"]`);
    if (!el) return false;
    const w = el.offsetWidth, h = el.offsetHeight;
    return !(n.x + w < box.left || n.x > box.right || n.y + h < box.top || n.y > box.bottom);
  }).map(n => n.id);
}

canvasWrap.addEventListener("mousedown", e => {
  // Skip if the press started on something interactive (a node, the canvas HUD buttons,
  // or an SVG edge). Otherwise treat it as empty-canvas — covers canvas-stage/grid/vignette/wrap.
  if (e.target.closest(".node") || e.target.closest(".canvas-hud") || e.target.tagName === "path" || e.target.tagName === "BUTTON") return;
  if (e.button === 1){
    // Middle-click: pan.
    panning = { x:e.clientX, y:e.clientY, ox:state.pan.x, oy:state.pan.y };
    return;
  }
  if (e.button === 0){
    // Left-click on empty canvas: start a rubber-band selection.
    e.preventDefault();
    const start = clientToCanvas(e.clientX, e.clientY);
    boxSelect = {
      sx: start.x, sy: start.y, cx: start.x, cy: start.y,
      additive: e.shiftKey || e.ctrlKey || e.metaKey,
      moved: false,
    };
    selectBoxEl.style.display = "block";
    updateSelectBoxStyle();
  }
});
window.addEventListener("mousemove", e => {
  if (boxSelect){
    const p = clientToCanvas(e.clientX, e.clientY);
    boxSelect.cx = p.x; boxSelect.cy = p.y;
    if (Math.abs(p.x - boxSelect.sx) > 2 || Math.abs(p.y - boxSelect.sy) > 2) boxSelect.moved = true;
    updateSelectBoxStyle();
    return;
  }
  if (!panning) return;
  state.pan.x = panning.ox + (e.clientX - panning.x);
  state.pan.y = panning.oy + (e.clientY - panning.y);
  applyTransform();
});
window.addEventListener("mouseup", () => {
  if (boxSelect){
    if (boxSelect.moved){
      const box = {
        left:   Math.min(boxSelect.sx, boxSelect.cx),
        right:  Math.max(boxSelect.sx, boxSelect.cx),
        top:    Math.min(boxSelect.sy, boxSelect.cy),
        bottom: Math.max(boxSelect.sy, boxSelect.cy),
      };
      const ids = rootNodesIntersectingBox(box);
      if (boxSelect.additive){
        selectMany(Array.from(new Set([...state.selectedIds, ...ids])));
      } else {
        selectMany(ids);
      }
    } else {
      // Plain click on empty canvas: deselect everything.
      selectNode(null);
    }
    selectBoxEl.style.display = "none";
    boxSelect = null;
    return;
  }
  panning = null;
});

canvasWrap.addEventListener("wheel", e => {
  if (!e.ctrlKey && !e.metaKey && Math.abs(e.deltaY) < 30) return;
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.0015));
}, { passive:false });

function zoomAt(cx, cy, factor){
  const rect = canvasWrap.getBoundingClientRect();
  const px = cx - rect.left, py = cy - rect.top;
  const newZoom = Math.min(2.5, Math.max(.3, state.zoom * factor));
  const ratio = newZoom / state.zoom;
  state.pan.x = px - (px - state.pan.x) * ratio;
  state.pan.y = py - (py - state.pan.y) * ratio;
  state.zoom = newZoom;
  applyTransform();
}

document.getElementById("zoomIn").addEventListener("click", () => {
  const r = canvasWrap.getBoundingClientRect();
  zoomAt(r.left + r.width/2, r.top + r.height/2, 1.2);
});
document.getElementById("zoomOut").addEventListener("click", () => {
  const r = canvasWrap.getBoundingClientRect();
  zoomAt(r.left + r.width/2, r.top + r.height/2, 1/1.2);
});
document.getElementById("zoomFit").addEventListener("click", () => {
  state.zoom = 1; state.pan = { x:0, y:0 }; applyTransform();
});

/* ===========================================================
   NODES
=========================================================== */
function createNode(type, isData, x, y){
  const sch = getSchema(type, isData);
  if (sch.isProvider && state.nodes.some(n => n.type === "nutanix")){
    toast("Only one provider allowed");
    return;
  }
  const id = uid();
  const fields = {};
  sch.fields.forEach(f => { if (f.default !== undefined) fields[f.key] = f.default; });
  // defaults for name/_name
  const sameKindCount = state.nodes.filter(n => n.type === type && n.isData === isData).length + 1;
  const baseLabel = type.replace(/^nutanix_/,"").replace(/_v2$/,"");
  if (sch.isGeneric){
    fields._name = `${baseLabel}_${sameKindCount}`;
  } else if (type === "nutanix_category_v2"){
    fields.key = "environment"; fields.value = `value_${sameKindCount}`;
  } else {
    // Pick the highest-priority identifier-like field that exists on this schema and seed it.
    const idField = ID_FIELD_PRIORITY.find(k => sch.fields.find(f => f.key === k));
    if (idField){
      fields[idField] = `${baseLabel}_${sameKindCount}`;
    } else {
      // Schema has no identifier-like field — give the resource a synthetic TF label.
      fields._tf_label = `${baseLabel}_${sameKindCount}`;
    }
  }
  if (type === "nutanix_virtual_machine_v2"){
    fields._nics         = fields._nics         || [];
    fields._disks        = fields._disks        || [];
    fields._serial_ports = fields._serial_ports || [];
    fields._cd_roms      = fields._cd_roms      || [];
    fields._gpus         = fields._gpus         || [];
  }
  state.nodes.push({ id, type, isData, x, y, fields, parentId: null });
  renderNodes();
  selectNode(id);
  updateAll();
}

/* ===========================================================
   CONTAINMENT HELPERS
=========================================================== */
function getChildren(id){ return state.nodes.filter(n => n.parentId === id); }
function getRoots(){ return state.nodes.filter(n => !n.parentId); }
function isAncestorOf(maybeAncestorId, ofId){
  let n = getNode(ofId);
  while (n && n.parentId){
    if (n.parentId === maybeAncestorId) return true;
    n = getNode(n.parentId);
  }
  return false;
}
function applyContainmentFromEdge(edge){
  const dir = CONTAINMENT_SLOTS[edge.kind];
  if (!dir) return;
  const childId = dir === "from" ? edge.to : edge.from;
  const parentId = dir === "from" ? edge.from : edge.to;
  if (childId === parentId) return;
  if (isAncestorOf(childId, parentId)) return;
  const child = getNode(childId);
  if (child) child.parentId = parentId;
}
function clearContainmentFromEdge(edge){
  const dir = CONTAINMENT_SLOTS[edge.kind];
  if (!dir) return;
  const childId = dir === "from" ? edge.to : edge.from;
  const child = getNode(childId);
  if (!child) return;
  // If another containment edge still implies a parent, leave it
  const stillContained = state.edges.some(other => {
    if (other.id === edge.id) return false;
    const od = CONTAINMENT_SLOTS[other.kind];
    if (!od) return false;
    const oc = od === "from" ? other.to : other.from;
    return oc === childId;
  });
  if (!stillContained){
    // pop child back onto canvas near old parent
    const oldParent = getNode(child.parentId);
    if (oldParent){
      child.x = (oldParent.x || 0) + 40;
      child.y = (oldParent.y || 0) + 40;
    }
    child.parentId = null;
  }
}
function isContainmentEdge(edge){ return !!CONTAINMENT_SLOTS[edge.kind]; }

/* Containers eligible to host children (used for "drop here" stub display). */
const CONTAINER_TYPES = new Set([
  "nutanix_vpc_v2", "nutanix_subnet_v2", "nutanix_virtual_machine_v2",
]);
function canContain(type){ return CONTAINER_TYPES.has(type); }

function renderNodes(){
  nodesLayer.innerHTML = "";
  getRoots().forEach(n => {
    const el = renderNode(n, 0);
    el.style.left = n.x + "px";
    el.style.top  = n.y + "px";
    nodesLayer.appendChild(el);
  });
  emptyOverlay.style.display = state.nodes.length ? "none" : "grid";
  document.getElementById("stampNodes").textContent = String(state.nodes.length).padStart(3,"0");
  renderEdges();
}

function renderNode(n, depth){
  const sch = getSchema(n);
  const catMeta = CATEGORIES[inferCategory(n.type)];
  const accent = sch.accent || catMeta.accent;
  const isChild = depth > 0;
  const el = document.createElement("div");
  el.className = "node depth-" + Math.min(3, depth)
               + (state.selectedIds.includes(n.id) ? " selected" : "")
               + (n.isData ? " is-data" : "")
               + (isChild ? " is-child" : "");
  el.style.setProperty("--accent", accent);
  el.dataset.id = n.id;

  const summary = sch.summary ? sch.summary(n.fields) : (sch.isGeneric ? [["block", n.isData ? "data" : "resource"]] : []);
  const kindLabel = n.isData ? "DATA" : (sch.isProvider ? "PROV" : "RES");

  let html = `
    <span class="node-corner tl"></span><span class="node-corner tr"></span>
    <span class="node-corner bl"></span><span class="node-corner br"></span>
    <div class="node-head">
      <div class="node-icon">${ICONS[sch.icon || catMeta.icon] || ICONS.misc}</div>
      <div class="node-title">
        <div class="node-name">${escapeHtml(displayName(n))}</div>
        <div class="node-type"><span class="badge">${kindLabel}</span>${n.type}</div>
      </div>
      <div class="node-port" data-id="${n.id}" title="Drag to connect"></div>
    </div>`;

  if (summary.length){
    html += `<div class="node-body">${summary.map(([k,v]) =>
      `<div class="node-fact"><span class="k">${k}</span><span class="v ${v==="—"?"muted":""}">${escapeHtml(String(v))}</span></div>`
    ).join("")}</div>`;
  }

  // Inline VM sub-block summaries (collapsed line items)
  if (n.type === "nutanix_virtual_machine_v2"){
    const subParts = [];
    (n.fields._serial_ports||[]).forEach((it,i) => subParts.push(`<div class="node-fact"><span class="k">serial #${i}</span><span class="v">${it.is_connected===false?"off":"on"}</span></div>`));
    (n.fields._cd_roms||[]).forEach((it,i) => subParts.push(`<div class="node-fact"><span class="k">cd-rom #${i}</span><span class="v">${escapeHtml(it.bus_type||"IDE")}</span></div>`));
    (n.fields._gpus||[]).forEach((it,i) => subParts.push(`<div class="node-fact"><span class="k">gpu #${i}</span><span class="v">${escapeHtml(it.vendor||"NVIDIA")}</span></div>`));
    if (n.fields._cloud_init && (n.fields._cloud_init.user_data || n.fields._cloud_init.datasource_type)){
      subParts.push(`<div class="node-fact"><span class="k">cloud-init</span><span class="v">configured</span></div>`);
    }
    if (subParts.length) html += `<div class="node-body" style="border-top:1px dashed var(--line-soft); padding-top:6px">${subParts.join("")}</div>`;
  }

  // category chips
  const catEdges = state.edges.filter(e => e.to === n.id && e.kind === "categories");
  if (catEdges.length){
    html += `<div class="node-chips">`;
    catEdges.forEach(e => {
      const c = getNode(e.from);
      if (!c) return;
      html += `<span class="node-chip" data-edge-id="${e.id}" data-cat-id="${c.id}">${escapeHtml(displayName(c))}<span class="x" data-rm-edge="${e.id}">×</span></span>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
  attachNodeHandlers(el, n, depth);
  return el;
}

function attachNodeHandlers(el, n, depth){
  const head = el.querySelector(":scope > .node-head");
  if (!head) return;

  head.addEventListener("mousedown", ev => {
    if (ev.target.classList.contains("node-port")) return;
    ev.stopPropagation();
    const additive = ev.shiftKey || ev.ctrlKey || ev.metaKey;
    if (additive){
      toggleSelection(n.id);
      return; // no drag for additive click
    }
    const wasInSelection = state.selectedIds.includes(n.id);
    if (!wasInSelection) selectNode(n.id);
    if (n.parentId) return; // children: no canvas drag (managed by parent)
    // Drag everyone in the current selection (only top-level cards) together.
    const draggedIds = state.selectedIds.filter(id => {
      const nd = getNode(id);
      return nd && !nd.parentId;
    });
    const starts = draggedIds.map(id => {
      const nd = getNode(id);
      return { id, ox: nd.x, oy: nd.y };
    });
    const start = { x:ev.clientX, y:ev.clientY };
    let didDrag = false;
    function mv(e){
      const dx = (e.clientX - start.x) / state.zoom;
      const dy = (e.clientY - start.y) / state.zoom;
      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) didDrag = true;
      starts.forEach(s => {
        const nd = getNode(s.id);
        if (!nd) return;
        nd.x = s.ox + dx;
        nd.y = s.oy + dy;
        const dom = nodesLayer.querySelector(`.node[data-id="${s.id}"]`);
        if (dom){ dom.style.left = nd.x+"px"; dom.style.top = nd.y+"px"; }
      });
      renderEdges();
    }
    function up(){
      window.removeEventListener("mousemove", mv);
      window.removeEventListener("mouseup", up);
      // No drag + node was already in a multi-selection → collapse to just this one
      if (!didDrag && wasInSelection && state.selectedIds.length > 1) selectNode(n.id);
    }
    window.addEventListener("mousemove", mv);
    window.addEventListener("mouseup", up);
  });
  head.addEventListener("click", ev => {
    // Selection is handled in mousedown/mouseup; this stops the click from bubbling.
    if (ev.target.classList.contains("node-port")) return;
    ev.stopPropagation();
  });

  const port = head.querySelector(".node-port");
  port.addEventListener("mousedown", ev => {
    ev.stopPropagation();
    ev.preventDefault();
    port.classList.add("connecting");
    state.connecting = { fromId: n.id, mouseX: ev.clientX, mouseY: ev.clientY };
    showConnectBanner(true);
    function mv(e){
      state.connecting.mouseX = e.clientX;
      state.connecting.mouseY = e.clientY;
      renderEdges();
    }
    function up(e){
      window.removeEventListener("mousemove", mv);
      window.removeEventListener("mouseup", up);
      port.classList.remove("connecting");
      const target = e.target.closest(".node");
      if (target && target.dataset.id !== n.id){
        tryConnect(n.id, target.dataset.id);
      }
      state.connecting = null;
      showConnectBanner(false);
      renderEdges();
    }
    window.addEventListener("mousemove", mv);
    window.addEventListener("mouseup", up);
  });

  // category chip × button
  el.querySelectorAll(":scope > .node-chips .x").forEach(x => {
    x.addEventListener("click", ev => {
      ev.stopPropagation();
      const id = x.dataset.rmEdge;
      removeEdge(id);
    });
  });
}

function removeEdge(id){
  const e = state.edges.find(x => x.id === id);
  if (!e) return;
  state.edges = state.edges.filter(x => x.id !== id);
  renderNodes();
  updateAll();
}

function showConnectBanner(show){
  let b = document.querySelector(".connect-banner");
  if (show && !b){
    b = document.createElement("div");
    b.className = "connect-banner";
    b.textContent = "drop on target node to connect";
    canvasWrap.appendChild(b);
  } else if (!show && b){ b.remove(); }
}

/* ===========================================================
   CONNECTIONS
=========================================================== */
function tryConnect(fromId, toId){
  const from = getNode(fromId), to = getNode(toId);
  if (!from || !to) return;
  const accepts = (getSchema(to).accepts) || {};
  let slotKey = null;
  for (const [slot, kinds] of Object.entries(accepts)){
    if (kinds.includes(from.type)) { slotKey = slot; break; }
  }
  if (!slotKey){
    // generic dependency
    slotKey = "depends_on";
  }
  const isList = slotKey.includes(".") || slotKey === "categories" || slotKey === "depends_on";
  if (!isList){
    state.edges = state.edges.filter(e => !(e.to === toId && e.kind === slotKey));
  } else {
    if (state.edges.some(e => e.from === fromId && e.to === toId && e.kind === slotKey)) return;
  }
  const edge = { id: uid(), from: fromId, to: toId, kind: slotKey };
  state.edges.push(edge);
  renderNodes();
  updateAll();
}

function getRootOf(id){
  let n = getNode(id);
  while (n && n.parentId) n = getNode(n.parentId);
  return n;
}
function getNodeRect(id){
  const el = nodesLayer.querySelector(`.node[data-id="${id}"]`);
  if (!el) return null;
  const root = getRootOf(id);
  if (!root) return null;
  // Compute position relative to canvas-stage by walking offsets up to nodesLayer
  let x = 0, y = 0;
  let cur = el;
  while (cur && cur !== nodesLayer){
    x += cur.offsetLeft;
    y += cur.offsetTop;
    cur = cur.offsetParent;
    if (cur === document.body) break;
  }
  return { x, y, w: el.offsetWidth, h: el.offsetHeight };
}

function renderEdges(){
  while (connSvg.firstChild) connSvg.removeChild(connSvg.firstChild);
  const svgNS = "http://www.w3.org/2000/svg";

  state.edges.forEach(e => {
    if (e.kind === "categories") return; // visualized as chip
    const a = getNode(e.from), b = getNode(e.to);
    if (!a || !b) return;

    // Anchor edges to the visible root cards (the nested card may be inside another).
    const ar = getNodeRect(e.from); const br = getNodeRect(e.to);
    if (!ar || !br) return;
    const ax = ar.x + ar.w, ay = ar.y + 22;
    const bx = br.x,        by = br.y + 22;

    const path = document.createElementNS(svgNS, "path");
    const dx = Math.max(40, Math.abs(bx-ax)*0.35);
    path.setAttribute("d", `M ${ax} ${ay} C ${ax+dx} ${ay}, ${bx-dx} ${by}, ${bx} ${by}`);
    path.setAttribute("class", "edge");
    const accent = (getSchema(a).accent) || CATEGORIES[inferCategory(a.type)].accent;
    path.style.stroke = accent;
    path.addEventListener("click", ev => {
      ev.stopPropagation();
      removeEdge(e.id);
    });
    connSvg.appendChild(path);

    const midX = (ax+bx)/2, midY = (ay+by)/2;
    const labelText = e.kind.split(".").pop().replace(/_/g," ");
    const tw = labelText.length * 5.6 + 8;
    const bg = document.createElementNS(svgNS, "rect");
    bg.setAttribute("x", midX - tw/2); bg.setAttribute("y", midY - 7);
    bg.setAttribute("width", tw); bg.setAttribute("height", 13);
    bg.setAttribute("class", "edge-label-bg");
    connSvg.appendChild(bg);
    const lbl = document.createElementNS(svgNS, "text");
    lbl.setAttribute("x", midX); lbl.setAttribute("y", midY + 3);
    lbl.setAttribute("text-anchor", "middle");
    lbl.setAttribute("class", "edge-label");
    lbl.textContent = labelText;
    connSvg.appendChild(lbl);
  });

  if (state.connecting){
    const ar = getNodeRect(state.connecting.fromId);
    if (ar){
      const ax = ar.x + ar.w, ay = ar.y + 22;
      const p = clientToCanvas(state.connecting.mouseX, state.connecting.mouseY);
      const path = document.createElementNS(svgNS, "path");
      const dx = Math.max(40, Math.abs(p.x-ax)*0.35);
      path.setAttribute("d", `M ${ax} ${ay} C ${ax+dx} ${ay}, ${p.x-dx} ${p.y}, ${p.x} ${p.y}`);
      path.setAttribute("class", "edge preview");
      connSvg.appendChild(path);
    }
  }
}

/* ===========================================================
   SELECTION + INSPECTOR
=========================================================== */
function applySelectionHighlight(prevIds, nextIds){
  // Avoid a full renderNodes() — that rebuilds the DOM mid-drag and detaches the
  // captured `el` reference, causing the dragged card to teleport on mouseup.
  // Just toggle the .selected class on the affected nodes.
  prevIds.forEach(id => {
    const el = nodesLayer.querySelector(`.node[data-id="${id}"]`);
    if (el) el.classList.remove("selected");
  });
  nextIds.forEach(id => {
    const el = nodesLayer.querySelector(`.node[data-id="${id}"]`);
    if (el) el.classList.add("selected");
  });
}
function updateSelectionStatus(){
  const ids = state.selectedIds;
  const el = document.getElementById("statSelected");
  if (!ids.length){ el.textContent = "SEL —"; return; }
  if (ids.length === 1){
    const n = getNode(ids[0]);
    el.textContent = n ? `SEL ${displayName(n)}` : "SEL —";
    return;
  }
  el.textContent = `SEL ${ids.length} ITEMS`;
}
function selectNode(id){
  const prev = state.selectedIds.slice();
  state.selectedIds = id ? [id] : [];
  applySelectionHighlight(prev, state.selectedIds);
  renderInspector();
  updateSelectionStatus();
}
function selectMany(ids){
  const prev = state.selectedIds.slice();
  state.selectedIds = Array.from(new Set(ids || [])).filter(id => getNode(id));
  applySelectionHighlight(prev, state.selectedIds);
  renderInspector();
  updateSelectionStatus();
}
function toggleSelection(id){
  if (!id) return;
  const has = state.selectedIds.includes(id);
  selectMany(has ? state.selectedIds.filter(x => x !== id) : [...state.selectedIds, id]);
}

document.querySelectorAll(".insp-tab").forEach(t => {

function renderProviderForm(body){

  const accent = sch.accent || CATEGORIES.connection.accent;
  body.innerHTML = `
    <div class="insp-hero" style="--accent:${accent}">
      <div><span class="kind-pill">PROVIDER</span></div>
      <h2>Nutanix Connection</h2>
      <div class="insp-type"><b>provider "nutanix"</b> · ${escapeHtml(state.provider.pc_version)}</div>
    </div>
    <div class="insp-section">
      <h3>Connection</h3>
      <div id="providerFields"></div>
    </div>
    <div class="insp-section" style="padding-bottom:18px">
      <div class="field-hint">PC version is also available in the top bar; it controls the <code>required_providers</code> version constraint emitted in your Terraform.</div>
    </div>`;
  const fieldsEl = document.getElementById("providerFields");
  sch.fields.forEach(f => {
    const wrap = document.createElement("div");
    wrap.className = "field" + (f.type === "textarea" ? " full" : "");
    const reqMark = f.required ? `<span class="req">*</span>` : "";
    const val = state.provider[f.key];
    let control;
    if (f.type === "enum"){
      control = `<select data-key="${f.key}">${f.options.map(o => `<option value="${o}" ${o===(val||"")?"selected":""}>${o||"—"}</option>`).join("")}</select>`;
    } else if (f.type === "bool"){
      control = `<select data-key="${f.key}"><option value="false" ${!val?"selected":""}>false</option><option value="true" ${val?"selected":""}>true</option></select>`;
    } else if (f.type === "number"){
      control = `<input type="number" data-key="${f.key}" value="${val??""}" placeholder="${escapeAttr(f.placeholder||"")}"/>`;
    } else if (f.type === "password"){
      control = `<input type="password" data-key="${f.key}" value="${escapeAttr(val||"")}" placeholder="${escapeAttr(f.placeholder||"")}"/>`;
    } else {
      control = `<input type="text" data-key="${f.key}" value="${escapeAttr(val||"")}" placeholder="${escapeAttr(f.placeholder||"")}"/>`;
    }
    wrap.innerHTML = `<label>${f.label}${reqMark}</label>${control}${f.hint ? `<div class="field-hint">${escapeHtml(f.hint)}</div>` : ""}`;
    fieldsEl.appendChild(wrap);
  });
  fieldsEl.querySelectorAll("[data-key]").forEach(inp => {
    inp.addEventListener("input", e => {
      const key = e.target.dataset.key;
      let v = e.target.value;
      const fdef = sch.fields.find(x => x.key === key);
      if (fdef && fdef.type === "number") v = v === "" ? "" : Number(v);
      if (fdef && fdef.type === "bool") v = v === "true";
      state.provider[key] = v;
      // Keep the topbar dropdown + version pin in sync if the user edits PC version here.
      if (key === "pc_version"){
        if (pcSelect) pcSelect.value = v;
        if (typeof refreshPcPin === "function") refreshPcPin();
        const heroType = document.querySelector(".insp-hero .insp-type");
        if (heroType) heroType.innerHTML = `<b>provider "nutanix"</b> · ${escapeHtml(v)}`;
      }
      updateAll();
    });
  });
}

function renderInspector(){
  const body = document.getElementById("inspBody");
  if (state.tab === "code"){ renderCodePanel(body); return; }
  if (state.selectedIds.length === 0){ renderProviderForm(body); return; }
  const nodes = state.selectedIds.map(getNode).filter(Boolean);
  body.innerHTML = "";
  if (nodes.length === 1){
    const sec = document.createElement("div");
    sec.className = "insp-section-wrap";
    body.appendChild(sec);
    renderNodeSection(sec, nodes[0], { showActions:true });
    return;
  }
  // Multi-select: stacked sections + shared batch footer.
  const banner = document.createElement("div");
  banner.className = "insp-multi-banner";
  banner.innerHTML = `<span class="kind-pill">SELECTION</span><span class="multi-count">${nodes.length} items</span>`;
  body.appendChild(banner);
  nodes.forEach((n, i) => {
    const sec = document.createElement("div");
    sec.className = "insp-section-wrap insp-multi-item";
    if (i > 0) sec.classList.add("with-sep");
    body.appendChild(sec);
    renderNodeSection(sec, n, { showActions:false });
  });
  const actions = document.createElement("div");
  actions.className = "insp-actions";
  actions.innerHTML = `
    <button class="btn ghost" data-batch="duplicate">${ICONS.copy} Duplicate ${nodes.length}</button>
    <button class="btn danger" data-batch="delete">${ICONS.trash} Delete ${nodes.length}</button>`;
  body.appendChild(actions);
  actions.querySelector('[data-batch="duplicate"]').addEventListener("click", duplicateSelected);
  actions.querySelector('[data-batch="delete"]').addEventListener("click", deleteSelected);
}

/* Renders one node's full inspector form (hero + fields + sub-blocks + optional actions)
   into the given container. Uses class-scoped queries so multiple sections can coexist
   in the body during multi-select. */
function renderNodeSection(container, node, opts){
  const sch = getSchema(node);
  const accent = sch.accent || CATEGORIES[inferCategory(node.type)].accent;
  const kindBadge = node.isData ? "DATA" : (sch.isProvider ? "PROVIDER" : "RESOURCE");
  container.innerHTML = `
    <div class="insp-hero" style="--accent:${accent}">
      <div><span class="kind-pill">${kindBadge}</span></div>
      <h2>${escapeHtml(displayName(node))}</h2>
      <div class="insp-type"><b>${node.type}</b>${sch.isProvider ? "" : `.${tfId(node)}`}</div>
    </div>
    <div class="insp-section">
      <h3>${sch.isGeneric ? "Generic Block" : "Arguments"}</h3>
      <div class="inspFields"></div>
      ${sch.isGeneric ? `<div class="field full"><div class="field-hint">Schema not encoded — write any HCL arguments inline. They paste verbatim into the ${node.isData ? "data" : "resource"} block.</div></div>` : ""}
    </div>
    ${hasSubBlocks(node.type) ? `
    <div class="insp-section">
      <h3>Inline Configuration</h3>
      <div class="inspSubblocks"></div>
      <div class="subblock-add">
        ${SUB_BLOCKS[node.type].arrays.map(([k, s]) => `<button data-add="${k}">${s.label}</button>`).join("")}
        ${SUB_BLOCKS[node.type].singletons.map(([k, s]) => `<button data-add="${k}">${s.label}</button>`).join("")}
      </div>
    </div>` : ""}
    ${opts.showActions ? `<div class="insp-actions">
      ${sch.isProvider ? "" : `<button class="btn ghost" data-action="duplicate">${ICONS.copy} Duplicate</button>`}
      <button class="btn danger" data-action="delete">${ICONS.trash} Delete</button>
    </div>` : ""}
  `;
  const fieldsEl = container.querySelector(".inspFields");
  // If a typed schema has no identifier-like field, surface a synthetic _tf_label so the user can rename.
  let renderFields = sch.fields;
  if (!sch.isGeneric && !sch.isProvider){
    const hasIdField = ID_FIELD_PRIORITY.some(k => sch.fields.find(f => f.key === k));
    if (!hasIdField){
      renderFields = [
        { key:"_tf_label", label:"TF Label", required:true, type:"text", hint:"Terraform-local resource label (no Nutanix arg — only used for `resource \"X\" \"<this>\" {}`)." },
        ...sch.fields,
      ];
    }
  }
  renderFields.forEach(f => {
    if (f.showIf && !f.showIf(node.fields)) return;
    const wrap = document.createElement("div");
    wrap.className = "field";
    const reqMark = f.required ? `<span class="req">*</span>` : "";
    const val = node.fields[f.key];
    let control;
    if (f.type === "textarea"){
      wrap.classList.add("full");
      control = `<textarea data-key="${f.key}" placeholder="${escapeAttr(f.placeholder||"")}">${escapeHtml(val||"")}</textarea>`;
    } else if (f.type === "enum"){
      control = `<select data-key="${f.key}">${f.options.map(o => `<option value="${o}" ${o===(val||"")?"selected":""}>${o||"—"}</option>`).join("")}</select>`;
    } else if (f.type === "bool"){
      control = `<select data-key="${f.key}"><option value="false" ${!val?"selected":""}>false</option><option value="true" ${val?"selected":""}>true</option></select>`;
    } else if (f.type === "number"){
      control = `<input type="number" data-key="${f.key}" value="${val??""}" placeholder="${escapeAttr(f.placeholder||"")}"/>`;
    } else if (f.type === "password"){
      control = `<input type="password" data-key="${f.key}" value="${escapeAttr(val||"")}" placeholder="${escapeAttr(f.placeholder||"")}"/>`;
    } else {
      control = `<input type="text" data-key="${f.key}" value="${escapeAttr(val||"")}" placeholder="${escapeAttr(f.placeholder||"")}"/>`;
    }
    wrap.innerHTML = `<label>${f.label}${reqMark}</label>${control}${f.hint ? `<div class="field-hint">${escapeHtml(f.hint)}</div>` : ""}`;
    fieldsEl.appendChild(wrap);
  });
  fieldsEl.querySelectorAll("[data-key]").forEach(inp => {
    inp.addEventListener("input", e => {
      const key = e.target.dataset.key;
      let v = e.target.value;
      const fdef = renderFields.find(x => x.key === key);
      if (fdef && fdef.type === "number") v = v === "" ? "" : Number(v);
      if (fdef && fdef.type === "bool") v = v === "true";
      node.fields[key] = v;
      // If this field gates other fields' visibility, re-render the inspector so the form reflects it.
      if (fdef && fdef.triggersVisibility){
        renderNodes();
        renderInspector();
        updateAll();
        return;
      }
      renderNodes();
      const heroH2 = container.querySelector(".insp-hero h2");
      const heroType = container.querySelector(".insp-hero .insp-type");
      if (heroH2) heroH2.textContent = displayName(node);
      if (heroType) heroType.innerHTML = `<b>${node.type}</b>${sch.isProvider ? "" : `.${tfId(node)}`}`;
      updateAll();
    });
  });
  if (hasSubBlocks(node.type)) renderSubblocksFor(node, container);
  if (opts.showActions){
    const delBtn = container.querySelector('[data-action="delete"]');
    if (delBtn) delBtn.addEventListener("click", deleteSelected);
    const dupBtn = container.querySelector('[data-action="duplicate"]');
    if (dupBtn) dupBtn.addEventListener("click", duplicateSelected);
  }
}

          { key:"l4_src_end",   label:"L4 Src End",   type:"number" },
          { key:"l4_dst_start", label:"L4 Dst Start", type:"number" },
          { key:"l4_dst_end",   label:"L4 Dst End",   type:"number" },
          { key:"icmp_type", label:"ICMP Type", type:"number" },

          { key:"reroute_fallback", label:"Fallback", type:"enum", options:["","PASSTHROUGH","NO_ACTION","ALLOW","DENY"], default:"" },
        ],
        emit: (lines, lvl, it) => {
          const subnetBlock = (lvl, label, addr_type, subnet) => {
            lines.push(`${indent(lvl)}${label} {`);
            pushIfSet(lines, "address_type", addr_type, "string", lvl+1);
            if (subnet){
              const [ip, mask] = subnet.split("/");
              lines.push(`${indent(lvl+1)}subnet_prefix {`);
              lines.push(`${indent(lvl+2)}ipv4 {`);
              lines.push(`${indent(lvl+3)}ip { value = ${JSON.stringify(ip)} prefix_length = ${Number(mask||24)} }`);
              lines.push(`${indent(lvl+3)}prefix_length = ${Number(mask||24)}`);
              lines.push(`${indent(lvl+2)}}`);
              lines.push(`${indent(lvl+1)}}`);
            }
            lines.push(`${indent(lvl)}}`);
          };
          lines.push(`${indent(lvl)}policies {`);
          pushIfSet(lines, "is_bidirectional", it.is_bidirectional, "bool", lvl+1);
          lines.push(`${indent(lvl+1)}policy_match {`);
          subnetBlock(lvl+2, "source",      it.src_address_type,  it.src_subnet);
          subnetBlock(lvl+2, "destination", it.dest_address_type, it.dest_subnet);
          pushIfSet(lines, "protocol_type", it.protocol_type, "string", lvl+2);
          if (it.protocol_type === "TCP" || it.protocol_type === "UDP"){
            if (it.l4_src_start || it.l4_dst_start){
              lines.push(`${indent(lvl+2)}protocol_parameters {`);
              lines.push(`${indent(lvl+3)}layer_four_protocol_object {`);

                lines.push(`${indent(lvl+4)}source_port_range_list {`);
