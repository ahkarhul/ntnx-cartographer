name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue deploys: don't cancel one that's already publishing — just wait.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # The site is just index.html. Stage it (plus the LICENSE / README the user
      # may want browsable) into a clean directory so we don't ship .github/, etc.
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp README.md _site/ 2>/dev/null || true
          cp LICENSE _site/ 2>/dev/null || true
          cp SECURITY.md _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
